<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FCA Builder — VATSIM Flow Control</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg:#0a0e14; --panel:#111722cc; --panel-solid:#0f141d; --panel-2:#0d121b;
    --line:#1d2734; --line-2:#2a3744;
    --text:#cdd6e0; --muted:#76838f; --muted-2:#566270;
    --amber:#f5a623; --amber-dim:rgba(245,166,35,.16);
    --cyan:#49d3e6; --green:#56d364; --red:#ff6b6b;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --ui: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--ui);overflow:hidden}
  #map{position:absolute;inset:0;background:#0a0e14;z-index:0}

  /* ---------- Leaflet dark tuning ---------- */
  .leaflet-container{background:#0a0e14;font-family:var(--mono)}
  .leaflet-control-zoom a{background:var(--panel-solid);color:var(--text);border-color:var(--line)!important}
  .leaflet-control-zoom a:hover{background:#19212d}
  .leaflet-bar{border:1px solid var(--line)!important;box-shadow:0 2px 12px rgba(0,0,0,.6)}
  .leaflet-control-attribution{background:rgba(10,14,20,.7)!important;color:var(--muted-2)!important}
  .leaflet-control-attribution a{color:var(--muted)!important}

  .artcc-label{background:none;border:none;box-shadow:none;color:#5e7184;font-family:var(--mono);
    font-size:10px;font-weight:600;letter-spacing:.08em;text-shadow:0 0 6px #000,0 0 6px #000}

  /* ---------- top bar ---------- */
  .topbar{position:absolute;top:0;left:0;right:0;height:46px;z-index:600;display:flex;align-items:center;
    gap:14px;padding:0 14px;background:linear-gradient(180deg,rgba(10,14,20,.94),rgba(10,14,20,.66));
    border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:baseline;gap:9px;white-space:nowrap}
  .brand b{font-family:var(--mono);font-size:14px;letter-spacing:.14em;color:var(--text)}
  .brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--amber)}
  .topbar .spacer{flex:1}
  .stat{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
  .stat b{color:var(--text);font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);box-shadow:0 0 0 0 transparent}
  .dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.demo{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .dot.dead{background:var(--red)}

  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--text);background:#161d28;
    border:1px solid var(--line-2);border-radius:5px;padding:6px 10px;cursor:pointer;transition:.12s;white-space:nowrap}
  .btn:hover{background:#1d2733;border-color:#3a4a5a}
  .btn.primary{background:var(--amber);color:#1a1205;border-color:var(--amber);font-weight:700}
  .btn.primary:hover{background:#ffb43a}
  .btn.ghost{background:transparent}
  .btn.sm{padding:4px 8px;font-size:10px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* ---------- sidebar ---------- */
  .sidebar{position:absolute;top:46px;left:0;bottom:0;width:320px;z-index:550;display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(13,18,27,.95),rgba(11,15,23,.92));border-right:1px solid var(--line);
    backdrop-filter:blur(10px);transition:transform .22s ease}
  .sidebar.hidden{transform:translateX(-100%)}
  .side-head{padding:12px 14px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .side-head h2{margin:0;font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--muted);font-weight:600}
  .side-scroll{flex:1;overflow-y:auto;padding:10px 12px 60px}
  .side-scroll::-webkit-scrollbar{width:8px}
  .side-scroll::-webkit-scrollbar-thumb{background:#22303d;border-radius:4px}

  .empty{font-family:var(--mono);font-size:11px;color:var(--muted-2);line-height:1.7;border:1px dashed var(--line-2);
    border-radius:8px;padding:14px;text-align:center}
  .empty b{color:var(--amber);display:block;margin-bottom:4px;letter-spacing:.1em}

  /* FCA card */
  .fca-card{border:1px solid var(--line-2);border-radius:8px;margin-bottom:9px;overflow:hidden;background:#0f151e;transition:.12s}
  .fca-card.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-dim),0 4px 16px rgba(0,0,0,.4)}
  .fca-card.off{opacity:.5}
  .fca-row{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer}
  .swatch{width:11px;height:11px;border-radius:2px;flex:none;box-shadow:0 0 7px currentColor}
  .fca-name{flex:1;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fca-meta{display:flex;gap:8px;padding:0 11px 9px;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .fca-meta span{background:#162030;border:1px solid var(--line);border-radius:4px;padding:2px 6px}
  .demand{font-family:var(--mono);font-size:10px;padding:5px 11px;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;color:var(--muted)}
  .demand .v{font-weight:700}
  .demand.hot .v{color:var(--red)} .demand.ok .v{color:var(--green)}

  /* form */
  .form{padding:12px;border:1px solid var(--amber);border-radius:8px;background:#0f151e;margin-bottom:10px}
  .form h3{margin:0 0 10px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--amber)}
  .fld{margin-bottom:10px}
  .fld label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
  .fld input{width:100%;background:#0a0e14;border:1px solid var(--line-2);border-radius:5px;color:var(--text);
    font-family:var(--mono);font-size:12px;padding:7px 9px}
  .fld input:focus{outline:none;border-color:var(--amber)}
  .fld .hint{font-family:var(--mono);font-size:9px;color:var(--muted-2);margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .swatches{display:flex;gap:7px;margin-top:2px}
  .sw{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent}
  .sw.on{border-color:#fff}
  .seg{display:flex;gap:4px}
  .seg.seg2 button{flex:1}
  .seg button{flex:1;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--muted);
    background:#0a0e14;border:1px solid var(--line-2);border-radius:5px;padding:6px 4px;cursor:pointer;transition:.12s}
  .seg button:hover{color:var(--text);border-color:#3a4a5a}
  .seg button.on{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);font-weight:700}
  .strip .rm{font-size:13px;color:var(--muted-2);cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1}
  .strip .rm:hover{color:var(--red);background:#1a1010}
  .ph{font-size:8px;font-weight:700;letter-spacing:.08em;padding:1px 4px;border-radius:3px;vertical-align:1px;margin-right:2px}
  .ph.air{background:#0e2a30;color:var(--cyan);border:1px solid #1d4a52}
  .ph.gnd{background:#2e2407;color:var(--amber);border:1px solid #5a4818}
  .excl{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .excl .row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
  .excl .restore{color:var(--cyan);cursor:pointer}
  .excl .restore:hover{text-decoration:underline}
  .form-actions{display:flex;gap:8px;margin-top:4px}
  .form-actions .btn{flex:1;text-align:center}

  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .toolbar .btn{flex:1;text-align:center}

  .layers{border-top:1px solid var(--line);margin-top:6px;padding-top:12px}
  .layers .lh{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--muted);margin-bottom:9px}
  .toggle{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:11px;
    color:var(--text);padding:5px 0;cursor:pointer}
  .sw-track{width:34px;height:18px;border-radius:9px;background:#222d3a;position:relative;transition:.15s;flex:none}
  .sw-track.on{background:var(--amber)}
  .sw-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#cdd6e0;transition:.15s}
  .sw-track.on .sw-knob{left:18px;background:#1a1205}

  /* ---------- sequence panel ---------- */
  .seq{position:absolute;top:46px;right:0;bottom:0;width:360px;z-index:540;display:flex;flex-direction:column;
    background:linear-gradient(180deg,rgba(13,18,27,.96),rgba(11,15,23,.93));border-left:1px solid var(--line);
    backdrop-filter:blur(10px);transform:translateX(100%);transition:transform .22s ease}
  .seq.show{transform:translateX(0)}
  .seq-head{padding:12px 14px;border-bottom:1px solid var(--line)}
  .seq-head .t{display:flex;align-items:center;gap:8px}
  .seq-head .t b{font-family:var(--mono);font-size:13px;letter-spacing:.04em}
  .seq-head .sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
  .seq-head .sub span{background:#162030;border:1px solid var(--line);border-radius:4px;padding:2px 6px}
  .seq-head .sub span.rate{color:var(--amber);border-color:#4a3a18}
  .seq-scroll{flex:1;overflow-y:auto;padding:8px 10px 40px}
  .seq-scroll::-webkit-scrollbar{width:8px}
  .seq-scroll::-webkit-scrollbar-thumb{background:#22303d;border-radius:4px}

  /* flight strip */
  .strip{display:grid;grid-template-columns:24px 1fr auto;gap:9px;align-items:center;background:#0f151e;
    border:1px solid var(--line-2);border-left-width:3px;border-radius:6px;padding:8px 10px;margin-bottom:7px;font-family:var(--mono);cursor:pointer}
  .strip:hover{background:#131b26}
  .strip .num{font-size:13px;font-weight:700;color:var(--amber);text-align:center}
  .strip .cs{font-size:13px;font-weight:700;letter-spacing:.04em}
  .strip .info{font-size:10px;color:var(--muted);margin-top:2px}
  .strip .eta{text-align:right}
  .strip .eta .big{font-size:14px;font-weight:700}
  .strip .eta .dl{font-size:10px;margin-top:2px}
  .dl.zero{color:var(--green)} .dl.low{color:var(--amber)} .dl.high{color:var(--red)}

  .ladder-wrap{border:1px solid var(--line);border-radius:8px;padding:10px;margin:4px 0 12px;background:#0c1119}
  .ladder-wrap .lt{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}

  /* toast / instruction */
  .toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:700;background:rgba(15,21,30,.96);
    border:1px solid var(--amber);border-radius:8px;padding:9px 16px;font-family:var(--mono);font-size:11px;color:var(--text);
    box-shadow:0 6px 24px rgba(0,0,0,.55);display:none;align-items:center;gap:10px;letter-spacing:.03em}
  .toast.show{display:flex}
  .toast .k{background:#222d3a;border:1px solid var(--line-2);border-radius:3px;padding:1px 5px;color:var(--amber);font-size:10px}

  /* floating toggles for collapsed panels */
  .float{position:absolute;z-index:560;background:var(--panel-solid);border:1px solid var(--line-2);border-radius:6px;
    width:34px;height:34px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);
    box-shadow:0 2px 12px rgba(0,0,0,.5)}
  .float:hover{color:var(--text);border-color:#3a4a5a}
  .float svg{width:18px;height:18px}

  /* plane marker */
  .plane{transform-origin:center}
  .plane svg{display:block;filter:drop-shadow(0 0 3px rgba(0,0,0,.9))}
  .vtx{background:#fff;border:2px solid var(--amber);border-radius:50%;box-shadow:0 0 8px rgba(245,166,35,.7)}

  @media (max-width:860px){
    .sidebar{width:86vw;max-width:340px;box-shadow:8px 0 30px rgba(0,0,0,.6)}
    .seq{width:90vw;max-width:360px;box-shadow:-8px 0 30px rgba(0,0,0,.6)}
    .sidebar.hidden ~ .float.side{display:flex}
    .brand .tag{display:none}
    .stat.hideSm{display:none}
  }
</style>
</head>
<body>
<div id="map"></div>

<!-- TOP BAR -->
<div class="topbar">
  <button class="btn ghost sm" id="toggleSide" title="Panels">☰</button>
  <div class="brand"><b>FCA&nbsp;BUILDER</b><span class="tag">VATSIM&nbsp;FLOW</span></div>
  <div class="spacer" style="flex:1"></div>
  <div class="stat hideSm"><span class="dot" id="feedDot"></span><span id="feedTxt">connecting…</span></div>
  <div class="stat hideSm">traffic <b id="acCount">0</b></div>
  <div class="stat" id="refreshStat">next <b id="refreshIn">--</b>s</div>
  <button class="btn sm" id="refreshBtn">↻ now</button>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="side-head">
    <h2>FLOW CONSTRAINED AREAS</h2>
    <button class="btn ghost sm" id="hideSide">‹</button>
  </div>
  <div class="side-scroll">
    <div class="toolbar">
      <button class="btn primary" id="newFca">＋ New FCA</button>
      <button class="btn" id="exportBtn" title="Download all FCAs as JSON">⤓</button>
      <button class="btn" id="importBtn" title="Load FCAs from JSON">⤒</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>

    <div id="editorMount"></div>
    <div id="fcaList"></div>

    <div class="layers">
      <div class="lh">MAP LAYERS</div>
      <div class="toggle" data-layer="artcc"><span>ARTCC boundaries</span><div class="sw-track on"><div class="sw-knob"></div></div></div>
      <div class="toggle" data-layer="labels"><span>ARTCC labels</span><div class="sw-track on"><div class="sw-knob"></div></div></div>
      <div class="toggle" data-layer="traffic"><span>Live traffic</span><div class="sw-track on"><div class="sw-knob"></div></div></div>
      <div class="toggle" data-layer="edct"><span>Ground flights (EDCT)</span><div class="sw-track on"><div class="sw-knob"></div></div></div>
      <div class="toggle" data-layer="demo"><span>Demo traffic (offline)</span><div class="sw-track"><div class="sw-knob"></div></div></div>
    </div>
  </div>
</aside>

<!-- SEQUENCE PANEL -->
<aside class="seq" id="seqPanel">
  <div class="seq-head">
    <div class="t"><span class="swatch" id="seqSwatch"></span><b id="seqName">—</b>
      <div style="flex:1"></div>
      <button class="btn ghost sm" id="closeSeq">›</button>
    </div>
    <div class="sub" id="seqSub"></div>
  </div>
  <div class="seq-scroll" id="seqBody"></div>
</aside>

<!-- floating reopen buttons -->
<div class="float side" id="floatSide" style="top:54px;left:8px">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
"use strict";
/* ============================================================
   FCA BUILDER — VATSIM flow control / metering tool
   ============================================================ */

const US_BOUNDS = [[18, -130],[52, -64]];
const FCA_COLORS = ["#f5a623","#e879f9","#a3e635","#fb923c","#38bdf8","#f87171"];
const NM_PER_DEG = 60;                     // 1 deg lat ~ 60 nm
const LOOKAHEAD_NM = 1200;                 // how far ahead we project an aircraft's path
const DEMAND_WINDOW_MIN = 60;              // demand counted within this many minutes to the line
const REFRESH_SEC = 20;

/* ---------- state ---------- */
const state = {
  fcas: [],
  selectedId: null,
  drawing: null,           // {points:[], poly, markers:[]}
  editing: null,           // fca object being edited (or new)
  pilots: [],              // connected aircraft (air + ground)
  prefiles: [],            // prefiled flight plans (not yet connected)
  feed: "init",            // init | live | demo | dead
  layers: { artcc:true, labels:true, traffic:true, demo:false, edct:true },
  countdown: REFRESH_SEC,
};
let uid = 1;
const nid = () => "fca"+(uid++);

/* ============================================================
   MAP
   ============================================================ */
const map = L.map("map",{ zoomControl:false, worldCopyJump:false, attributionControl:true })
  .fitBounds(US_BOUNDS);
L.control.zoom({position:"bottomright"}).addTo(map);

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  subdomains:"abcd", maxZoom:11, minZoom:3,
  attribution:'© OpenStreetMap, © CARTO · traffic: VATSIM · boundaries: VATSpy'
}).addTo(map);

const artccLayer  = L.layerGroup().addTo(map);
const labelLayer  = L.layerGroup().addTo(map);
const trafficLayer= L.layerGroup().addTo(map);
const fcaLayer    = L.layerGroup().addTo(map);
const seqLayer    = L.layerGroup().addTo(map);   // projected crossing dots + vertex handles

/* ============================================================
   ARTCC BOUNDARIES
   ============================================================ */
const US_ARTCC = new Set(["ZAB","ZAU","ZBW","ZDC","ZDV","ZFW","ZHU","ZID","ZJX","ZKC",
  "ZLA","ZLC","ZMA","ZME","ZMP","ZNY","ZOA","ZOB","ZSE","ZTL","ZAN","ZHN","ZUA","ZAP"]);

function loadBoundaries(){
  const url = "https://cdn.jsdelivr.net/gh/vatsimnetwork/vatspy-data-project@master/Boundaries.geojson";
  fetch(url).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(gj=>{
      const feats = (gj.features||[]).filter(f=>{
        const p = f.properties||{};
        const id = (p.id||p.ID||p.prefix||"").toString().toUpperCase().replace(/^K/,"");
        const div = (p.division||"").toString().toUpperCase();
        return div==="USA" || US_ARTCC.has(id);
      });
      feats.forEach(f=>{
        const p=f.properties||{};
        const id=(p.id||p.ID||"").toString().toUpperCase();
        L.geoJSON(f,{ style:{ color:"#3a4d5e", weight:1, opacity:.85, fill:false } })
          .bindTooltip(id,{sticky:true,className:"artcc-label",direction:"top"})
          .addTo(artccLayer);
        // center label
        let la=p.label_lat, lo=p.label_lon;
        if(la==null||lo==null){ const c=L.geoJSON(f).getBounds().getCenter(); la=c.lat; lo=c.lng; }
        L.marker([la,lo],{interactive:false,
          icon:L.divIcon({className:"artcc-label",html:id,iconSize:[34,12]})}).addTo(labelLayer);
      });
      if(!feats.length) toast("No US boundaries found in feed.",2600);
    })
    .catch(err=>{
      console.warn("Boundaries failed:",err);
      toast("ARTCC boundaries unavailable (network). Tool still works.",4000);
    });
}
loadBoundaries();

/* ============================================================
   AIRPORT DATABASE  (ICAO -> [lat,lon]) — needed for ground/EDCT
   route geometry. Seeded with demo fields, filled from VATSpy.dat.
   ============================================================ */
const AIRPORTS = new Map();
function getAirport(icao){ if(!icao) return null; return AIRPORTS.get((""+icao).toUpperCase())||null; }
let airportsReady=false;
function loadAirports(){
  const url="https://cdn.jsdelivr.net/gh/vatsimnetwork/vatspy-data-project@master/VATSpy.dat";
  fetch(url).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(txt=>{
      let inApt=false, n=0;
      txt.split(/\r?\n/).forEach(line=>{
        if(line.startsWith("[")){ inApt=/\[Airports\]/i.test(line); return; }
        if(!inApt||!line||line.startsWith(";")) return;
        const c=line.split("|");                  // ICAO|Name|lat|lon|FIR|...
        if(c.length>=4){ const ic=c[0].trim().toUpperCase(), la=parseFloat(c[2]), lo=parseFloat(c[3]);
          if(ic && !isNaN(la) && !isNaN(lo)){ AIRPORTS.set(ic,[la,lo]); n++; } }
      });
      airportsReady=true;
      if(state.selectedId) renderAll();
      if(!n) toast("Airport DB empty — EDCT for prefiles limited.",3000);
    })
    .catch(err=>{ console.warn("Airport DB failed:",err);
      toast("Airport DB unavailable — EDCT works only for demo airports.",4000); });
}
loadAirports();

/* ============================================================
   TRAFFIC FEED
   ============================================================ */
let liveTimer=null, countdownTimer=null;

function setFeed(s){
  state.feed=s;
  const dot=document.getElementById("feedDot"), txt=document.getElementById("feedTxt");
  dot.className="dot"+(s==="live"?" live":s==="demo"?" demo":s==="dead"?" dead":"");
  txt.textContent = s==="live"?"LIVE · VATSIM":s==="demo"?"DEMO DATA":s==="dead"?"no feed":"connecting…";
}

function fpFields(fp){
  fp=fp||{};
  return { dep:(fp.departure||"").toUpperCase(), arr:(fp.arrival||"").toUpperCase(),
    type:fp.aircraft_short||fp.aircraft_faa||"", tas:parseInt(fp.cruise_tas,10)||0,
    fpAlt:parseAlt(fp.altitude), deptime:fp.deptime||"", route:fp.route||"" };
}
function fetchLive(){
  if(state.layers.demo){ return; }            // demo overrides live
  fetch("https://data.vatsim.net/v3/vatsim-data.json",{cache:"no-store"})
    .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(d=>{
      const pilots=(d.pilots||[])
        .filter(p=>typeof p.latitude==="number"&&typeof p.longitude==="number")
        .map(p=>{ const f=fpFields(p.flight_plan); const gs=p.groundspeed||0;
          return { callsign:p.callsign, lat:p.latitude, lon:p.longitude, alt:p.altitude||0,
            gs, hdg:p.heading||0, phase: gs<30 ? "gnd":"air", ...f }; });
      const connected=new Set(pilots.map(p=>p.callsign));
      const prefiles=(d.prefiles||[])
        .filter(p=>p.flight_plan && !connected.has(p.callsign))
        .map(p=>{ const f=fpFields(p.flight_plan);
          return { callsign:p.callsign, lat:null, lon:null, alt:0, gs:0, hdg:0, phase:"gnd", prefile:true, ...f }; });
      state.pilots=pilots; state.prefiles=prefiles; setFeed("live"); afterData();
    })
    .catch(err=>{
      console.warn("Live feed failed:",err);
      if(state.feed!=="demo"){ setFeed("dead");
        toast("Live VATSIM feed blocked here — flip on Demo traffic, or run the file locally.",5000); }
    });
}

/* ============================================================
   GEOMETRY
   ============================================================ */
const toRad=d=>d*Math.PI/180, toDeg=r=>r*180/Math.PI;
function haversineNm(la1,lo1,la2,lo2){
  const R=3440.065, dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function bearing(la1,lo1,la2,lo2){
  const y=Math.sin(toRad(lo2-lo1))*Math.cos(toRad(la2));
  const x=Math.cos(toRad(la1))*Math.sin(toRad(la2))-Math.sin(toRad(la1))*Math.cos(toRad(la2))*Math.cos(toRad(lo2-lo1));
  return (toDeg(Math.atan2(y,x))+360)%360;
}
// project lat/lon to local nm-plane centered at (lat0,lon0)
function toLocal(lat,lon,lat0,lon0){
  return [ (lon-lon0)*NM_PER_DEG*Math.cos(toRad(lat0)), (lat-lat0)*NM_PER_DEG ];
}
function localToLatLon(x,y,lat0,lon0){
  return [ lat0 + y/NM_PER_DEG, lon0 + x/(NM_PER_DEG*Math.cos(toRad(lat0))) ];
}
/* Forward ray from aircraft (heading) intersect FCA polyline.
   Returns {dist, lat, lon} of nearest crossing ahead, or null. */
function projectCrossing(p, pts){
  const lat0=p.lat, lon0=p.lon;
  const h=toRad(p.hdg||0);
  const dir=[Math.sin(h),Math.cos(h)];      // east=x, north=y
  let best=null;
  for(let i=0;i<pts.length-1;i++){
    const A=toLocal(pts[i][0],pts[i][1],lat0,lon0);
    const B=toLocal(pts[i+1][0],pts[i+1][1],lat0,lon0);
    const seg=[B[0]-A[0],B[1]-A[1]];
    const denom=dir[0]*seg[1]-dir[1]*seg[0];
    if(Math.abs(denom)<1e-9) continue;       // parallel
    // P0=(0,0); solve t*dir = A + u*seg
    const t=(A[0]*seg[1]-A[1]*seg[0])/denom;
    const u=(A[0]*dir[1]-A[1]*dir[0])/denom;
    if(t>0 && u>=0 && u<=1){
      if(!best||t<best.dist){
        const px=dir[0]*t, py=dir[1]*t;
        const ll=localToLatLon(px,py,lat0,lon0);
        best={dist:t, lat:ll[0], lon:ll[1]};
      }
    }
  }
  return (best && best.dist<=LOOKAHEAD_NM)?best:null;
}
/* Generic finite segment intersection in a local nm plane.
   Path P1->P2 vs FCA segment A->B. Returns {t,x,y} (t along path) or null. */
function segInt(P1,P2,A,B){
  const r=[P2[0]-P1[0],P2[1]-P1[1]], s=[B[0]-A[0],B[1]-A[1]];
  const den=r[0]*s[1]-r[1]*s[0]; if(Math.abs(den)<1e-9) return null;
  const qp=[A[0]-P1[0],A[1]-P1[1]];
  const t=(qp[0]*s[1]-qp[1]*s[0])/den, u=(qp[0]*r[1]-qp[1]*r[0])/den;
  if(t>=0&&t<=1&&u>=0&&u<=1) return {t,x:P1[0]+t*r[0],y:P1[1]+t*r[1]};
  return null;
}
/* Where a ground flight's (direct) route from origin to destination crosses the FCA. */
function groundCrossing(p,fca,nowMs){
  const o=(p.lat!=null&&p.lon!=null)?[p.lat,p.lon]:getAirport(p.dep);
  const dst=getAirport(p.arr);
  if(!o||!dst) return null;
  const course=bearing(o[0],o[1],dst[0],dst[1]);
  if(!fcaMatchesDir(fca,course)) return null;
  const P1=[0,0], P2=toLocal(dst[0],dst[1],o[0],o[1]), pathLen=Math.hypot(P2[0],P2[1]);
  let best=null;
  for(let i=0;i<fca.points.length-1;i++){
    const A=toLocal(fca.points[i][0],fca.points[i][1],o[0],o[1]);
    const B=toLocal(fca.points[i+1][0],fca.points[i+1][1],o[0],o[1]);
    const x=segInt(P1,P2,A,B);
    if(x){ const dist=x.t*pathLen; if(!best||dist<best.dist){ const ll=localToLatLon(x.x,x.y,o[0],o[1]);
      best={dist,lat:ll[0],lon:ll[1]}; } }
  }
  if(!best) return null;
  const tas=p.tas||420, transitSec=best.dist/tas*3600;
  const ptimeMs=ptimeToMs(p.deptime), effMs=Math.max(nowMs, ptimeMs||nowMs);
  const etaSec=(effMs-nowMs)/1000 + transitSec;
  return { dist:best.dist, cross:{lat:best.lat,lon:best.lon}, course, tas, transitSec, ptimeMs, effMs, etaSec, origin:o };
}
/* flight-plan altitude string -> feet */
function parseAlt(a){ if(a==null) return 0; a=(""+a).toUpperCase().replace(/\s|FL/g,"");
  const n=parseInt(a,10); if(isNaN(n)) return 0; return n<1000? n*100 : n; }
/* "HHMM" Zulu -> ms today (wrapped to nearest day), or null */
function ptimeToMs(dep){ if(!dep) return null; dep=(""+dep).replace(/\D/g,"").padStart(4,"0").slice(0,4);
  const h=+dep.slice(0,2), m=+dep.slice(2,4); if(isNaN(h)||isNaN(m)||h>23||m>59) return null;
  const now=new Date(), nowMs=now.getTime();
  let ms=Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),h,m,0);
  if(ms-nowMs>12*36e5) ms-=864e5; else if(nowMs-ms>12*36e5) ms+=864e5;
  return ms; }
function fmtZulu(ms){ const d=new Date(ms);
  return String(d.getUTCHours()).padStart(2,"0")+String(d.getUTCMinutes()).padStart(2,"0")+"Z"; }

/* ============================================================
   METERING — the core FCA logic
   ============================================================ */
function fcaMatchesAlt(fca,alt){
  const min=(fca.minFL!=null)?fca.minFL*100:-1;
  const max=(fca.maxFL!=null)?fca.maxFL*100:1e9;
  return alt>=min && alt<=max;
}
function fcaMatchesDest(fca,arr){
  if(!fca.dests||!fca.dests.length) return true;
  return fca.dests.includes((arr||"").toUpperCase());
}
/* heading -> compass quadrant of travel */
function dirOfHeading(h){
  h=((h%360)+360)%360;
  if(h>=315||h<45) return "N";
  if(h<135) return "E";
  if(h<225) return "S";
  return "W";
}
function fcaMatchesDir(fca,hdg){
  const d=fca.dir||"any";
  if(d==="any") return true;
  return dirOfHeading(hdg)===d;
}
const DIR_LABEL={any:"any dir","N":"NB","S":"SB","E":"EB","W":"WB"};

/* Build the metered sequence for an FCA from current traffic.
   Airborne flights absorb delay in the air; ground/prefile flights are
   slotted by route + filed TAS + proposed time and receive an EDCT. */
function computeSequence(fca){
  const out={items:[],demand:0,mode:fca.mode||"rate",rate:fca.rate||0,mit:fca.mit||0,
    minit:0,excluded:0,nAir:0,nGnd:0,nowMs:Date.now()};
  if(!fca.points||fca.points.length<2) return out;
  const nowMs=out.nowMs, ex=new Set(fca.excluded||[]);
  const cand=[];

  // --- airborne: already flying, current state ---
  for(const p of state.pilots){
    if(p.phase!=="air"||(p.gs||0)<40) continue;
    if(ex.has(p.callsign)){ out.excluded++; continue; }
    if(!fcaMatchesDest(fca,p.arr)) continue;
    if(!fcaMatchesAlt(fca,p.alt||0)) continue;
    if(!fcaMatchesDir(fca,p.hdg||0)) continue;
    const x=projectCrossing(p,fca.points); if(!x) continue;
    cand.push({p,phase:"air",dist:x.dist,eta:(x.dist/p.gs)*3600,cross:x,spd:p.gs});
  }

  // --- ground / prefile: pre-departure, eligible for EDCT ---
  if(state.layers.edct){
    const seen=new Set();
    const grounds=state.pilots.filter(p=>p.phase==="gnd").concat(state.prefiles||[]);
    for(const p of grounds){
      if(seen.has(p.callsign)) continue; seen.add(p.callsign);
      if(ex.has(p.callsign)){ out.excluded++; continue; }
      if(!fcaMatchesDest(fca,p.arr)) continue;
      if(!fcaMatchesAlt(fca,p.fpAlt||0)) continue;          // filed cruise alt
      const g=groundCrossing(p,fca,nowMs); if(!g) continue;
      cand.push({p,phase:"gnd",dist:g.dist,eta:g.etaSec,cross:g.cross,spd:g.tas,
        effMs:g.effMs,ptimeMs:g.ptimeMs,transitSec:g.transitSec});
    }
  }

  cand.sort((a,b)=>a.eta-b.eta);
  const rateGap = (out.mode==="rate" && fca.rate>0) ? 3600/fca.rate : 0;
  let prev=-1e9;
  cand.forEach(c=>{
    let gap;
    if(out.mode==="mit") gap = (fca.mit>0) ? (fca.mit/(c.spd||420))*3600 : 0;  // MIT nm / speed
    else gap = rateGap;
    c.gap=gap;
    const sched=Math.max(c.eta, prev+gap);
    c.sched=sched; c.delay=sched-c.eta; prev=sched;
    c.ctaMs=nowMs+sched*1000;                       // controlled crossing time
    if(c.phase==="gnd") c.edctMs=c.effMs+c.delay*1000;  // hold the departure by the delay
    if(c.phase==="air") out.nAir++; else out.nGnd++;
  });
  if(out.mode==="rate") out.minit=rateGap;
  else if(cand.length){ const sp=cand[Math.floor(cand.length/2)].spd||450; out.minit=(fca.mit/sp)*3600; }
  out.items=cand;
  out.demand=cand.filter(c=>c.eta<=DEMAND_WINDOW_MIN*60).length;
  return out;
}

/* ============================================================
   RENDER — traffic markers
   ============================================================ */
function planeIcon(color,hdg,active,num){
  const badge = active&&num!=null
    ? `<div style="position:absolute;top:-7px;right:-7px;background:${color};color:#13110a;border-radius:50%;
         width:13px;height:13px;font:700 9px/13px var(--mono,monospace);text-align:center;box-shadow:0 0 5px #000">${num}</div>` : "";
  const sz = active?16:12;
  const svg=`<div class="plane" style="position:relative;width:${sz}px;height:${sz}px">
    <div style="transform:rotate(${hdg}deg);width:${sz}px;height:${sz}px">
      <svg viewBox="0 0 24 24" width="${sz}" height="${sz}">
        <path d="M12 2 L19 21 L12 16.5 L5 21 Z" fill="${color}" stroke="#0a0e14" stroke-width="1.2"/>
      </svg></div>${badge}</div>`;
  return L.divIcon({className:"",html:svg,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
}
function renderTraffic(){
  trafficLayer.clearLayers();
  if(!state.layers.traffic) return;
  const b=map.getBounds().pad(0.15);
  const sel=state.fcas.find(f=>f.id===state.selectedId&&f.enabled);
  // who is in the selected FCA's sequence (for highlight + number)
  let seqMap=new Map();
  if(sel){ const s=computeSequence(sel); s.items.forEach((c,i)=>seqMap.set(c.p.callsign,{n:i+1,color:sel.color})); }
  let shown=0;
  for(const p of state.pilots){
    if(p.lat==null||p.lon==null) continue;
    if(!b.contains([p.lat,p.lon])) continue;
    if(shown>900) break;
    const hit=seqMap.get(p.callsign);
    const color=hit?hit.color:(p.phase==="gnd"?"#5e7184":"#49d3e6");
    const m=L.marker([p.lat,p.lon],{icon:planeIcon(color,p.hdg||0,!!hit,hit?hit.n:null),
      keyboard:false, riseOnHover:true});
    m.bindTooltip(
      `<b style="color:${color}">${p.callsign}</b>  ${p.type||""}<br>`+
      `${p.dep||"????"} → ${p.arr||"????"}<br>`+
      `FL${String(Math.round((p.alt||0)/100)).padStart(3,"0")}  ${p.gs||0}kt`,
      {className:"artcc-label",direction:"top",offset:[0,-6]});
    m.addTo(trafficLayer); shown++;
  }
}

/* ============================================================
   RENDER — FCA lines on map
   ============================================================ */
function renderFcaLines(){
  fcaLayer.clearLayers(); seqLayer.clearLayers();
  state.fcas.forEach(f=>{
    if(!f.enabled||f.points.length<2) return;
    const isSel=f.id===state.selectedId;
    L.polyline(f.points,{color:f.color,weight:isSel?4:2.5,opacity:isSel?1:.8,
      dashArray:isSel?null:"2 6"}).addTo(fcaLayer);
    // endpoint caps
    f.points.forEach((pt,i)=>{
      if(i===0||i===f.points.length-1)
        L.circleMarker(pt,{radius:3,color:f.color,fillColor:f.color,fillOpacity:1,weight:0}).addTo(fcaLayer);
    });
    // name label at midpoint
    const mid=f.points[Math.floor(f.points.length/2)];
    L.marker(mid,{interactive:false,
      icon:L.divIcon({className:"artcc-label",html:
        `<span style="color:${f.color};text-shadow:0 0 6px #000,0 0 6px #000">▮ ${f.name}</span>`,
        iconSize:[120,12]})}).addTo(fcaLayer);
  });
  // selected FCA: draggable vertex handles + projected crossing dots
  const sel=state.fcas.find(f=>f.id===state.selectedId&&f.enabled);
  if(sel&&sel.points.length>=2){
    sel.points.forEach((pt,idx)=>{
      const h=L.marker(pt,{draggable:true,
        icon:L.divIcon({className:"vtx",iconSize:[12,12],iconAnchor:[6,6]})}).addTo(seqLayer);
      h.on("drag",e=>{ sel.points[idx]=[e.latlng.lat,e.latlng.lng]; });
      h.on("dragend",()=>{ renderFcaLines(); renderTraffic(); renderFcaList(); renderSequence(); });
    });
    const s=computeSequence(sel);
    s.items.forEach((c,i)=>{
      const col=delayColor(c.delay);
      // crossing point on the line
      L.circleMarker([c.cross.lat,c.cross.lon],{radius:4,color:col,fillColor:col,fillOpacity:.9,weight:1})
        .bindTooltip(`#${i+1} ${c.p.callsign}`,{className:"artcc-label",direction:"top"})
        .addTo(seqLayer);
      // ground/prefile flights: show origin + the route leg to the line
      if(c.phase==="gnd"){
        const o=(c.p.lat!=null&&c.p.lon!=null)?[c.p.lat,c.p.lon]:getAirport(c.p.dep);
        if(o){
          L.polyline([o,[c.cross.lat,c.cross.lon]],{color:sel.color,weight:1,opacity:.35,dashArray:"1 5"}).addTo(seqLayer);
          if(c.p.lat==null){   // prefile has no plane marker — draw a departure square
            L.marker(o,{icon:L.divIcon({className:"",iconSize:[12,12],iconAnchor:[6,6],
              html:`<div style="width:9px;height:9px;background:${sel.color};border:1px solid #0a0e14;transform:rotate(45deg);box-shadow:0 0 6px ${sel.color}"></div>`})})
              .bindTooltip(`${c.p.callsign} · ${c.p.dep} · EDCT ${c.edctMs?fmtZulu(c.edctMs):"—"}`,
                {className:"artcc-label",direction:"top"}).addTo(seqLayer);
          }
        }
      }
    });
  }
}
function delayColor(sec){ return sec<30?"#56d364":sec<300?"#f5a623":"#ff6b6b"; }

/* ============================================================
   RENDER — sidebar list
   ============================================================ */
function renderFcaList(){
  const wrap=document.getElementById("fcaList");
  if(!state.fcas.length && !state.editing){

  }
  wrap.innerHTML="";
  state.fcas.forEach(f=>{
    const seq=computeSequence(f);
    const card=document.createElement("div");
    card.className="fca-card"+(f.id===state.selectedId?" sel":"")+(f.enabled?"":" off");
    const dmd=seq.demand;
    const limit=f.mode==="mit"?(f.mit||0):(f.rate||0);
    const hot=f.mode==="rate"&&f.rate>0&&dmd>f.rate;
    const minitTxt=seq.minit?fmtClock(seq.minit):"—";
    const constraintTxt = f.mode==="mit" ? ((f.mit?f.mit:"?")+" MIT") : (f.rate?f.rate+"/hr":"no rate");
    card.innerHTML=`
      <div class="fca-row" data-sel="${f.id}">
        <span class="swatch" style="color:${f.color};background:${f.color}"></span>
        <span class="fca-name">${escapeHtml(f.name)}</span>
        <div class="sw-track ${f.enabled?"on":""}" data-en="${f.id}" title="Enable/disable"><div class="sw-knob"></div></div>
      </div>
      <div class="fca-meta">
        <span>${f.dests&&f.dests.length?f.dests.join(" "):"ALL dest"}</span>
        <span>${f.minFL!=null?"FL"+f.minFL:"SFC"}–${f.maxFL!=null?"FL"+f.maxFL:"UNL"}</span>
        <span>${DIR_LABEL[f.dir||"any"]}</span>
        <span>${constraintTxt}</span>
      </div>
      <div class="demand ${hot?"hot":dmd?"ok":""}">
        <span>demand (≤${DEMAND_WINDOW_MIN}m) · ${f.mode==="mit"?"MIT "+(f.mit||"?")+"nm":"MINIT "+minitTxt}</span>
        <span class="v">${dmd}/${DEMAND_WINDOW_MIN===60?"hr":DEMAND_WINDOW_MIN+"m"}</span>
      </div>`;
    wrap.appendChild(card);
  });
  // wire
  wrap.querySelectorAll("[data-sel]").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.closest("[data-en]")) return;
    selectFca(el.getAttribute("data-sel"));
  }));
  wrap.querySelectorAll("[data-en]").forEach(el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    const f=state.fcas.find(x=>x.id===el.getAttribute("data-en"));
    if(f){ f.enabled=!f.enabled; renderAll(); }
  }));
}

/* ============================================================
   EDITOR FORM
   ============================================================ */
function openEditor(fca){
  state.editing=fca;
  const m=document.getElementById("editorMount");
  const isNew=!state.fcas.some(f=>f.id===fca.id);
  m.innerHTML=`
    <div class="form">
      <h3>${isNew?"NEW FCA":"EDIT FCA"} · ${fca.points.length} pts</h3>
      <div class="fld"><label>Name</label>
        <input id="f_name" value="${escapeHtml(fca.name)}" placeholder="e.g. ATL West Gate"></div>
      <div class="fld"><label>Destination airports</label>
        <input id="f_dest" value="${(fca.dests||[]).join(" ")}" placeholder="KATL KCLT  · blank = all">
        <div class="hint">space/comma separated ICAO. Blank meters every arrival crossing the line.</div></div>
      <div class="grid2">
        <div class="fld"><label>Min FL</label><input id="f_minfl" type="number" value="${fca.minFL??""}" placeholder="—"></div>
        <div class="fld"><label>Max FL</label><input id="f_maxfl" type="number" value="${fca.maxFL??""}" placeholder="—"></div>
      </div>
      <div class="fld"><label>Meter traffic crossing toward</label>
        <div class="seg" id="f_dir">
          <button data-d="any" class="${(fca.dir||'any')==='any'?'on':''}">Any</button>
          <button data-d="N" class="${fca.dir==='N'?'on':''}">N↑</button>
          <button data-d="E" class="${fca.dir==='E'?'on':''}">E→</button>
          <button data-d="S" class="${fca.dir==='S'?'on':''}">S↓</button>
          <button data-d="W" class="${fca.dir==='W'?'on':''}">W←</button>
        </div>
        <div class="hint">filters by the aircraft's direction of flight, regardless of how the line was drawn.</div></div>
      <div class="fld"><label>Constraint</label>
        <div class="seg seg2" id="f_mode">
          <button data-m="rate" class="${(fca.mode||'rate')==='rate'?'on':''}">Rate · ac/hr</button>
          <button data-m="mit" class="${fca.mode==='mit'?'on':''}">MIT · nm</button>
        </div>
        <div style="margin-top:8px;display:${(fca.mode||'rate')==='rate'?'block':'none'}" id="f_rateBox">
          <input id="f_rate" type="number" value="${fca.rate??""}" placeholder="30" style="width:100%">
          <div class="hint">aircraft per hour → fixed time spacing (MINIT) between crossings.</div>
        </div>
        <div style="margin-top:8px;display:${fca.mode==='mit'?'block':'none'}" id="f_mitBox">
          <input id="f_mit" type="number" value="${fca.mit??""}" placeholder="15" style="width:100%">
          <div class="hint">miles in trail → distance spacing, converted to time per aircraft's groundspeed.</div>
        </div>
      </div>
      <div class="fld"><label>Color</label><div class="swatches" id="f_sw"></div></div>
      <div class="form-actions">
        <button class="btn" id="f_redraw">↻ Redraw line</button>
        <button class="btn primary" id="f_save">Save FCA</button>
      </div>
      <div class="form-actions" style="margin-top:8px">
        <button class="btn ghost" id="f_cancel">Cancel</button>
        ${isNew?"":`<button class="btn ghost" id="f_delete" style="color:var(--red)">Delete</button>`}
      </div>
    </div>`;
  // color swatches
  const swWrap=document.getElementById("f_sw");
  FCA_COLORS.forEach(c=>{
    const s=document.createElement("div");
    s.className="sw"+(c===fca.color?" on":""); s.style.background=c;
    s.addEventListener("click",()=>{ fca.color=c; swWrap.querySelectorAll(".sw").forEach(x=>x.classList.remove("on")); s.classList.add("on"); renderFcaLines(); });
    swWrap.appendChild(s);
  });
  document.getElementById("f_save").addEventListener("click",saveEditor);
  document.getElementById("f_cancel").addEventListener("click",()=>{ closeEditor(); if(isNew) state.editing=null; renderAll(); });
  document.getElementById("f_redraw").addEventListener("click",()=>{ startDrawing(fca); });
  const del=document.getElementById("f_delete");
  if(del) del.addEventListener("click",()=>deleteFca(fca.id));
  // direction segmented control
  document.querySelectorAll("#f_dir button").forEach(b=>b.addEventListener("click",()=>{
    fca.dir=b.getAttribute("data-d");
    document.querySelectorAll("#f_dir button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
  }));
  // constraint mode segmented control
  document.querySelectorAll("#f_mode button").forEach(b=>b.addEventListener("click",()=>{
    fca.mode=b.getAttribute("data-m");
    document.querySelectorAll("#f_mode button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    document.getElementById("f_rateBox").style.display = fca.mode==="rate"?"block":"none";
    document.getElementById("f_mitBox").style.display  = fca.mode==="mit"?"block":"none";
  }));
  renderFcaList();
}
function saveEditor(){
  const f=state.editing; if(!f) return;
  f.name=(document.getElementById("f_name").value||"Untitled FCA").trim();
  f.dests=(document.getElementById("f_dest").value||"").toUpperCase().split(/[\s,]+/).filter(Boolean);
  const minfl=document.getElementById("f_minfl").value, maxfl=document.getElementById("f_maxfl").value;
  f.minFL=minfl===""?null:Math.max(0,parseInt(minfl,10));
  f.maxFL=maxfl===""?null:Math.max(0,parseInt(maxfl,10));
  const rate=document.getElementById("f_rate").value, mit=document.getElementById("f_mit").value;
  f.rate=rate===""?0:Math.max(0,parseInt(rate,10));
  f.mit =mit===""?0:Math.max(0,parseFloat(mit));
  if(f.points.length<2){ toast("Draw at least 2 points for the line.",2600); return; }
  if(f.mode==="rate"&&!f.rate){ toast("Enter a meter rate, or switch to MIT.",2600); return; }
  if(f.mode==="mit"&&!f.mit){ toast("Enter a MIT value, or switch to Rate.",2600); return; }
  if(!state.fcas.some(x=>x.id===f.id)) state.fcas.push(f);
  state.editing=null; closeEditor(); selectFca(f.id);
}
function closeEditor(){ document.getElementById("editorMount").innerHTML=""; }

/* ============================================================
   SEQUENCE PANEL
   ============================================================ */
function selectFca(id){
  state.selectedId = (state.selectedId===id)?null:id;
  renderAll();
  const sel=state.fcas.find(f=>f.id===state.selectedId);
  document.getElementById("seqPanel").classList.toggle("show",!!sel);
}
function renderSequence(){
  const sel=state.fcas.find(f=>f.id===state.selectedId);
  const panel=document.getElementById("seqPanel");
  if(!sel){ panel.classList.remove("show"); return; }
  panel.classList.add("show");
  document.getElementById("seqName").textContent=sel.name;
  document.getElementById("seqSwatch").style.background=sel.color;
  document.getElementById("seqSwatch").style.color=sel.color;

  const s=computeSequence(sel);
  const sub=document.getElementById("seqSub");
  const minitTxt=s.minit?fmtClock(s.minit):"unmetered";
  const totalDelay=s.items.reduce((a,c)=>a+c.delay,0);
  const constraintChip = sel.mode==="mit"
    ? `<span class="rate">${sel.mit||"?"} MIT nm</span><span>≈MINIT ${minitTxt}</span>`
    : `<span class="rate">${sel.rate?sel.rate+" ac/hr":"no rate"}</span><span>MINIT ${minitTxt}</span>`;
  sub.innerHTML=
    constraintChip+
    `<span>${DIR_LABEL[sel.dir||"any"]}</span>`+
    `<span>${s.nAir} air${state.layers.edct?` · ${s.nGnd} EDCT`:""}</span>`+
    `<span>demand ${s.demand}/hr</span>`+
    (totalDelay>60?`<span style="color:var(--red)">Σdelay ${fmtClock(totalDelay)}</span>`:"");

  const body=document.getElementById("seqBody");
  const exHtml=excludedHtml(sel);
  if(!sel.enabled){ body.innerHTML=`<div class="empty">FCA disabled. Enable it in the list to meter traffic.</div>`+exHtml; wireExcluded(sel); return; }
  if(!s.items.length){ body.innerHTML=`<div class="empty"><b>NO INBOUND TRAFFIC</b>No aircraft currently match this FCA's filters and direction and cross the line. Widen the FL band / destinations / direction, or wait for the next refresh.</div>`+exHtml; wireExcluded(sel); return; }

  // ladder timeline
  body.innerHTML=ladderSvg(s);
  // strips
  const list=document.createElement("div");
  s.items.forEach((c,i)=>{
    const cls=c.delay<30?"zero":c.delay<300?"low":"high";
    const fl=String(Math.round(((c.phase==="gnd"?c.p.fpAlt:c.p.alt)||0)/100)).padStart(3,"0");
    const strip=document.createElement("div");
    strip.className="strip"; strip.style.borderLeftColor=delayColor(c.delay);
    if(c.phase==="gnd"){
      const edct=c.edctMs?fmtZulu(c.edctMs):"—", ptime=c.ptimeMs?fmtZulu(c.ptimeMs):"now";
      const held=c.delay>=30;
      strip.innerHTML=`
        <div class="num">${i+1}</div>
        <div><div class="cs"><span class="ph gnd">EDCT</span> ${c.p.callsign} <span style="color:var(--muted);font-weight:400">${c.p.type||""}</span></div>
          <div class="info">${c.p.dep||"????"} → ${c.p.arr||"????"} · P${ptime} · FL${fl} · TAS${c.p.tas||"?"} · ${Math.round(c.dist)}nm · cross ${fmtZulu(c.ctaMs)}</div></div>
        <div class="eta"><div class="big" style="color:${held?delayColor(c.delay):"var(--text)"}">${edct}</div>
          <div class="dl ${cls}">${held?"hold +"+fmtClock(c.delay):"no delay"}</div></div>
        <div class="rm" data-rm="${escapeHtml(c.p.callsign)}" title="Remove from this FCA">✕</div>`;
    } else {
      strip.innerHTML=`
        <div class="num">${i+1}</div>
        <div><div class="cs"><span class="ph air">AIR</span> ${c.p.callsign} <span style="color:var(--muted);font-weight:400">${c.p.type||""}</span></div>
          <div class="info">${c.p.dep||"????"} → ${c.p.arr||"????"} · FL${fl} · ${c.p.gs}kt · ${Math.round(c.dist)}nm</div></div>
        <div class="eta"><div class="big">${fmtZulu(c.ctaMs)}</div>
          <div class="dl ${cls}">${c.delay<30?"on time":"air +"+fmtClock(c.delay)}</div></div>
        <div class="rm" data-rm="${escapeHtml(c.p.callsign)}" title="Remove from this FCA">✕</div>`;
    }
    strip.querySelector(".rm").addEventListener("click",e=>{ e.stopPropagation(); excludeAircraft(sel,c.p.callsign); });
    strip.addEventListener("click",()=>{ const o=(c.p.lat!=null)?[c.p.lat,c.p.lon]:getAirport(c.p.dep); if(o) map.panTo(o); });
    list.appendChild(strip);
  });
  body.appendChild(list);
  // excluded section
  const ex=document.createElement("div"); ex.innerHTML=exHtml;
  body.appendChild(ex); wireExcluded(sel);
}

function excludedHtml(fca){
  const ex=fca.excluded||[];
  if(!ex.length) return "";
  let rows=ex.map(cs=>`<div class="row"><span>✕ ${escapeHtml(cs)}</span><span class="restore" data-restore="${escapeHtml(cs)}">restore</span></div>`).join("");
  return `<div class="excl"><div class="row" style="color:var(--muted-2)"><span>REMOVED (${ex.length})</span>`+
    `<span class="restore" data-restore-all="1">restore all</span></div>${rows}</div>`;
}
function wireExcluded(fca){
  document.querySelectorAll("[data-restore]").forEach(el=>el.addEventListener("click",()=>{
    fca.excluded=(fca.excluded||[]).filter(c=>c!==el.getAttribute("data-restore")); renderAll();
  }));
  const all=document.querySelector("[data-restore-all]");
  if(all) all.addEventListener("click",()=>{ fca.excluded=[]; renderAll(); });
}
function excludeAircraft(fca,callsign){
  fca.excluded=fca.excluded||[];
  if(!fca.excluded.includes(callsign)) fca.excluded.push(callsign);
  renderAll();
}

/* SVG metering ladder: natural ETA (left) vs scheduled (right) */
function ladderSvg(s){
  const items=s.items.slice(0,18);
  if(!items.length) return "";
  const W=336, padT=22, padB=10, rowH=Math.max(16,Math.min(26,(220)/items.length));
  const H=padT+padB+rowH*items.length;
  const maxT=Math.max(items[items.length-1].sched, items[items.length-1].eta, 60);
  const x0=46, x1=W-14;
  const X=t=>x0+(x1-x0)*(t/maxT);
  let g=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">`;
  g+=`<text x="8" y="13" fill="#76838f" font-family="var(--mono,monospace)" font-size="9">ETA→</text>`;
  g+=`<text x="${x1}" y="13" fill="#f5a623" font-family="var(--mono,monospace)" font-size="9" text-anchor="end">metered crossing</text>`;
  // time gridlines every 10 min
  for(let m=0;m<=maxT/60;m+=10){
    const x=X(m*60);
    g+=`<line x1="${x}" y1="${padT-4}" x2="${x}" y2="${H-padB}" stroke="#1d2734" stroke-width="1"/>`;
    g+=`<text x="${x}" y="${H-1}" fill="#566270" font-family="var(--mono,monospace)" font-size="8" text-anchor="middle">${m}m</text>`;
  }
  items.forEach((c,i)=>{
    const y=padT+rowH*i+rowH/2;
    const xe=X(c.eta), xs=X(c.sched), col=delayColor(c.delay);
    if(c.delay>=30){ // delay bar
      g+=`<line x1="${xe}" y1="${y}" x2="${xs}" y2="${y}" stroke="${col}" stroke-width="2" stroke-dasharray="2 2"/>`;
    }
    g+=`<circle cx="${xe}" cy="${y}" r="2.4" fill="#3a4d5e"/>`;                 // natural ETA
    g+=`<circle cx="${xs}" cy="${y}" r="3.4" fill="${col}" stroke="#0a0e14" stroke-width="1"/>`; // scheduled
    g+=`<text x="4" y="${y+3}" fill="${col}" font-family="var(--mono,monospace)" font-size="9" font-weight="700">${i+1}</text>`;
    g+=`<text x="${Math.min(xs+6,x1-2)}" y="${y-4}" fill="#cdd6e0" font-family="var(--mono,monospace)" font-size="8">${c.p.callsign}</text>`;
  });
  g+=`</svg>`;
  const spaceLbl = s.mode==="mit" ? `MIT ${s.mit}nm` : `MINIT ${fmtClock(s.minit)}`;
  return `<div class="ladder-wrap"><div class="lt"><span>METERING LADDER</span><span>spacing = ${spaceLbl}</span></div>${g}</div>`;
}

/* ============================================================
   DRAWING
   ============================================================ */
function startDrawing(forFca){
  cancelDrawing();
  const target = forFca || makeBlankFca();
  target.points=[];
  state.drawing={ fca:target, poly:null, markers:[] };
  map.getContainer().style.cursor="crosshair";
  map.doubleClickZoom.disable();
  showToast(`<span>Click to add points</span><span class="k">dbl-click</span> or <span class="k">↵</span> finish <span class="k">esc</span> cancel`,true);
  renderFcaLines();
}
function makeBlankFca(){
  return { id:nid(), name:"FCA "+(state.fcas.length+1), points:[], dests:[], minFL:null, maxFL:null,
           dir:"any", mode:"rate", rate:30, mit:15, excluded:[],
           color:FCA_COLORS[state.fcas.length%FCA_COLORS.length], enabled:true };
}
function drawAddPoint(latlng){
  const d=state.drawing; if(!d) return;
  d.fca.points.push([latlng.lat,latlng.lng]);
  refreshDrawing();
}
function refreshDrawing(){
  const d=state.drawing; if(!d) return;
  if(d.poly){ map.removeLayer(d.poly); } d.markers.forEach(m=>map.removeLayer(m)); d.markers=[];
  if(d.fca.points.length>=1){
    d.poly=L.polyline(d.fca.points,{color:d.fca.color,weight:3,dashArray:"4 4"}).addTo(map);
    d.fca.points.forEach(p=>{
      d.markers.push(L.circleMarker(p,{radius:4,color:d.fca.color,fillColor:"#0a0e14",fillOpacity:1,weight:2}).addTo(map));
    });
  }
}
function finishDrawing(){
  const d=state.drawing; if(!d) return;
  if(d.fca.points.length<2){ toast("Need at least 2 points.",2200); return; }
  const fca=d.fca; teardownDrawingLayers();
  state.drawing=null; map.getContainer().style.cursor=""; map.doubleClickZoom.enable(); hideToast();
  openEditor(fca);
  renderFcaLines();
}
function cancelDrawing(){
  if(!state.drawing) return;
  teardownDrawingLayers();
  state.drawing=null; map.getContainer().style.cursor=""; map.doubleClickZoom.enable(); hideToast();
  renderFcaLines();
}
function teardownDrawingLayers(){
  const d=state.drawing; if(!d) return;
  if(d.poly) map.removeLayer(d.poly); d.markers.forEach(m=>map.removeLayer(m));
}

map.on("click",e=>{ if(state.drawing) drawAddPoint(e.latlng); });
map.on("dblclick",e=>{ if(state.drawing){ finishDrawing(); } });
map.on("moveend zoomend",()=>renderTraffic());
window.addEventListener("keydown",e=>{
  if(!state.drawing) return;
  if(e.key==="Enter") finishDrawing();
  else if(e.key==="Escape") cancelDrawing();
});

/* ============================================================
   DELETE / EXPORT / IMPORT
   ============================================================ */
function deleteFca(id){
  state.fcas=state.fcas.filter(f=>f.id!==id);
  if(state.selectedId===id) state.selectedId=null;
  state.editing=null; closeEditor();
  document.getElementById("seqPanel").classList.remove("show");
  renderAll();
}
function exportFcas(){
  if(!state.fcas.length){ toast("No FCAs to export.",2000); return; }
  const data=JSON.stringify({version:1,exported:new Date().toISOString(),fcas:state.fcas},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="fca-config.json"; a.click(); URL.revokeObjectURL(a.href);
  toast("Exported "+state.fcas.length+" FCA(s).",2000);
}
function importFcas(file){
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result); const arr=Array.isArray(d)?d:d.fcas;
      if(!Array.isArray(arr)) throw new Error("bad format");
      arr.forEach(f=>{ f.id=nid(); if(!f.color) f.color=FCA_COLORS[0]; if(f.enabled==null) f.enabled=true;
        if(!f.dir) f.dir="any"; if(!f.mode) f.mode="rate"; if(f.mit==null) f.mit=15; if(!Array.isArray(f.excluded)) f.excluded=[]; });
      state.fcas=state.fcas.concat(arr);
      renderAll(); toast("Imported "+arr.length+" FCA(s).",2200);
    }catch(err){ toast("Could not read that file.",2600); }
  };
  r.readAsText(file);
}

/* ============================================================
   UI WIRING
   ============================================================ */
function renderAll(){ renderFcaLines(); renderTraffic(); renderFcaList(); renderSequence(); }

document.getElementById("newFca").addEventListener("click",()=>{ closeEditor(); startDrawing(null); });
document.getElementById("refreshBtn").addEventListener("click",()=>{ state.layers.demo?stepDemo():fetchLive(); state.countdown=REFRESH_SEC; });
document.getElementById("exportBtn").addEventListener("click",exportFcas);
document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change",e=>{ if(e.target.files[0]) importFcas(e.target.files[0]); e.target.value=""; });
document.getElementById("closeSeq").addEventListener("click",()=>{ state.selectedId=null; renderAll(); });

// sidebar collapse
function setSide(open){ document.getElementById("sidebar").classList.toggle("hidden",!open);
  document.getElementById("floatSide").style.display=open?"none":"flex"; }
document.getElementById("hideSide").addEventListener("click",()=>setSide(false));
document.getElementById("toggleSide").addEventListener("click",()=>{
  const open=document.getElementById("sidebar").classList.contains("hidden"); setSide(open); });
document.getElementById("floatSide").addEventListener("click",()=>setSide(true));

// layer toggles
document.querySelectorAll(".toggle[data-layer]").forEach(t=>{
  t.addEventListener("click",()=>{
    const key=t.getAttribute("data-layer");
    const track=t.querySelector(".sw-track");
    const on=!track.classList.contains("on");
    track.classList.toggle("on",on);
    state.layers[key]=on;
    if(key==="artcc") on?map.addLayer(artccLayer):map.removeLayer(artccLayer);
    if(key==="labels") on?map.addLayer(labelLayer):map.removeLayer(labelLayer);
    if(key==="traffic") renderTraffic();
    if(key==="edct") renderAll();
    if(key==="demo"){
      if(on){ setFeed("demo"); stepDemo(); } else { demoFleet=[]; fetchLive(); }
    }
  });
});

/* ---------- helpers ---------- */
function fmtClock(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60),s=sec%60;
  return m+":"+String(s).padStart(2,"0"); }
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
let toastTimer=null;
function toast(msg,ms){ const t=document.getElementById("toast"); t.innerHTML=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),ms||2500); }
function showToast(html,sticky){ const t=document.getElementById("toast"); t.innerHTML=html; t.classList.add("show");
  if(!sticky){ clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2500);} }
function hideToast(){ document.getElementById("toast").classList.remove("show"); }

/* ---------- boot ---------- */
setFeed("init");
renderFcaList();
startFeedLoop();
</script>
