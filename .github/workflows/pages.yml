# Deploy static VATFLOW files to GitHub Pages
#
# Repo Settings → Pages → Build and deployment → Source must be
# "GitHub Actions" (not "Deploy from a branch"). Using both causes
# duplicate deploys and red "pages build and deployment" failures.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deploys instead of cancelling — rapid merges to main were racing Pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          SHA="${{ github.sha }}"
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'scripts' \
            --exclude '_site' \
            --exclude 'data/source' \
            ./ _site/
          touch _site/.nojekyll
          echo "$SHA" > _site/deploy-sha.txt
          # Embed SHA in index.html — always served; dotfiles/extra paths may 404 on Pages edge.
          if [ -f _site/index.html ]; then
            sed -i "s|</head>|  <!-- vatflow-deploy-sha:${SHA} -->\n</head>|" _site/index.html
          fi
          echo "Artifact stamped with $SHA"
          ls -la _site/deploy-sha.txt _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployment
        run: |
          SHA="${{ github.sha }}"
          BASE="https://djbrombizzle.github.io/vatflow"
          echo "Waiting for Pages CDN propagation…"
          sleep 45
          for i in $(seq 1 18); do
            LIVE=""
            LIVE=$(curl -fsS "$BASE/deploy-sha.txt" 2>/dev/null | tr -d '[:space:]' || true)
            if [ -z "$LIVE" ]; then
              LIVE=$(curl -fsS "$BASE/index.html" 2>/dev/null | grep -oE 'vatflow-deploy-sha:[a-f0-9]{40}' | head -1 | cut -d: -f2 || true)
            fi
            if [ "$LIVE" = "$SHA" ]; then
              echo "Live site matches commit $SHA (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: live=${LIVE:-empty} want=$SHA"
            sleep 20
          done
          echo "::warning::SHA not visible on CDN yet — deploy step succeeded; site may still be propagating."
          echo "Check manually: $BASE/index.html and $BASE/deploy-sha.txt"
          exit 1
