# Deploy static VATFLOW files to GitHub Pages
#
# IMPORTANT — Repo Settings → Pages → Build and deployment:
#   Source MUST be "GitHub Actions" (not "Deploy from a branch").
#   Using both causes duplicate deploys and stale CDN content.
#
# Stale remote branches do NOT affect Pages; only pushes to main deploy.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          SHA="${{ github.sha }}"
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'scripts' \
            --exclude '_site' \
            --exclude 'data/source' \
            ./ _site/
          touch _site/.nojekyll
          echo "$SHA" > _site/deploy-sha.txt
          if [ -f _site/index.html ]; then
            sed -i "s|</head>|  <!-- vatflow-deploy-sha:${SHA} -->\n</head>|" _site/index.html
          fi
          echo "Stamped artifact with $SHA"
          grep -o 'vatflow-deploy-sha:[a-f0-9]*' _site/index.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Confirm deployment (non-blocking)
        if: steps.deployment.outcome == 'success'
        run: |
          SHA="${{ github.sha }}"
          BASE="https://djbrombizzle.github.io/vatflow"
          echo "Deploy succeeded. Spot-checking CDN (does not fail the workflow)…"
          sleep 30
          for i in $(seq 1 6); do
            HTML=$(curl -fsSL "$BASE/index.html" -H "Cache-Control: no-cache" -H "Pragma: no-cache" 2>/dev/null || true)
            LIVE=$(echo "$HTML" | grep -oE 'vatflow-deploy-sha:[a-f0-9]{40}' | head -1 | cut -d: -f2 || true)
            TXT=$(curl -fsSL "$BASE/deploy-sha.txt" -H "Cache-Control: no-cache" 2>/dev/null | tr -d '[:space:]' || true)
            if [ "$LIVE" = "$SHA" ] || [ "$TXT" = "$SHA" ]; then
              echo "CDN shows commit $SHA (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: index=${LIVE:-none} txt=${TXT:-none} want=$SHA"
            sleep 15
          done
          echo "::notice::Deploy step succeeded but CDN has not shown $SHA yet."
          echo "::notice::This is a known GitHub Pages propagation delay — not caused by extra branches."
          echo "::notice::Site: $BASE — check again in a few minutes."
