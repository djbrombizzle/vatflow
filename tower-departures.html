<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Departures — VATFLOW</title>
<link rel="stylesheet" href="shared/vatflow-nav.css">
<link rel="stylesheet" href="shared/vatflow-help.css">
<style>
  :root {
    --bg: #080b10;
    --panel: #0e1319;
    --line: #1e2834;
    --line-2: #2a3848;
    --text: #d4dde6;
    --muted: #8a97a3;
    --muted-2: #5c6b78;
    --amber: #e8a838;
    --amber-dim: rgba(232, 168, 56, 0.12);
    --cyan: #5ba8c9;
    --green: #4caf7a;
    --red: #d45c5c;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --vatflow-nav-h: 28px;
  }
  * { box-sizing: border-box; }
  .hidden { display: none !important; }
  html, body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--ui); }
  body.tower-page { display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(10, 14, 20, 0.96), rgba(10, 14, 20, 0.88));
  }
  .brand b { font-family: var(--mono); font-size: 14px; letter-spacing: 0.12em; }
  .brand .tag { font-family: var(--mono); font-size: 10px; color: var(--amber); margin-left: 8px; letter-spacing: 0.14em; }
  .spacer { flex: 1; }
  .stat { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .stat b { color: var(--text); font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-2); }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.dead { background: var(--red); }
  .dot.demo { background: var(--amber); }

  #lockCtl { display: flex; align-items: center; gap: 6px; }
  #lockBtn { font-family: var(--mono); font-size: 10px; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: 1px solid; }
  #lockBtn.locked { background: var(--amber-dim); color: var(--amber); border-color: rgba(232, 168, 56, 0.4); }
  #lockBtn.unlocked { background: rgba(76, 175, 122, 0.12); color: var(--green); border-color: rgba(76, 175, 122, 0.35); }
  #pwInput { width: 108px; background: #0a0e14; border: 1px solid var(--line-2); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 10px; padding: 5px 7px; }
  #lockMsg { font-family: var(--mono); font-size: 10px; color: var(--muted-2); }
  #lockMsg.lockerr { color: var(--red); }

  .field-row { display: flex; align-items: center; gap: 8px; }
  .field-row label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .field-row input {
    width: 72px; background: #0a0e14; border: 1px solid var(--line-2); border-radius: 5px;
    color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 8px; text-transform: uppercase;
  }
  .field-row input:focus { outline: none; border-color: var(--amber); }
  .btn {
    font-family: var(--mono); font-size: 11px; color: var(--text); background: #161d28;
    border: 1px solid var(--line-2); border-radius: 5px; padding: 6px 10px; cursor: pointer;
  }
  .btn:hover { background: #1d2733; }
  .btn.primary { background: var(--amber); color: #1a1205; border-color: var(--amber); font-weight: 700; }
  .btn.sm { padding: 4px 8px; font-size: 10px; }

  main { flex: 1; padding: 12px 16px 24px; overflow: auto; }
  .strip {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 10px 12px; margin-bottom: 12px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; font-family: var(--mono); font-size: 11px;
  }
  .strip .field { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; color: var(--amber); }
  .stat-warn b { color: var(--amber); }
  .stat-alert b { color: var(--red); }
  .stat-muted b { color: var(--muted); }

  .seqhint { font-family: var(--mono); font-size: 10px; color: var(--muted-2); margin: 0 0 10px; letter-spacing: 0.04em; }

  .fca-grid {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .fca-block {
    flex: 0 0 540px;
    width: 540px;
    max-width: 540px;
    min-width: 540px;
  }
  .fca-block.pinned .fca-block-head { border-left: 2px solid var(--amber); padding-left: 6px; }
  .fca-block.hidden-block { display: none; }
  .fca-block-head {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 6px 8px; margin-bottom: 4px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  }
  .fca-block-head .fca-name { font-weight: 700; font-size: 11px; flex: 1; min-width: 0; }
  .fca-block-head .fca-meta { color: var(--muted); font-size: 9px; }
  .fca-block-head .fca-actions { display: flex; gap: 4px; margin-left: auto; }
  .fca-btn {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em;
    padding: 2px 6px; border-radius: 3px; cursor: pointer;
    background: #161d28; border: 1px solid var(--line-2); color: var(--muted);
  }
  .fca-btn:hover { color: var(--text); border-color: var(--muted); }
  .fca-btn.on { color: var(--amber); border-color: rgba(232, 168, 56, 0.5); background: var(--amber-dim); }
  .hidden-fcas-bar {
    font-family: var(--mono); font-size: 9px; color: var(--muted);
    margin: 0 0 12px; padding: 8px 10px; background: var(--panel);
    border: 1px dashed var(--line-2); border-radius: 6px;
  }
  .hidden-fcas-bar button {
    font-family: inherit; font-size: inherit; cursor: pointer;
    background: none; border: none; color: var(--cyan); padding: 0 4px;
  }
  .hidden-fcas-bar button:hover { text-decoration: underline; }
  .fca-block.empty .fca-block-head { opacity: 0.55; }

  /* --- flight strips (same look/size as the FCA Builder sequence panel) --- */
  .stripList { padding: 8px; }
  .strip{display:grid;grid-template-columns:24px 1fr auto auto;gap:8px;align-items:center;background:#0f151e;
    border:1px solid var(--line-2);border-left-width:3px;border-radius:6px;padding:8px 10px;margin-bottom:7px;font-family:var(--mono)}
  .strip:last-child{margin-bottom:0}
  .strip:hover{background:#131b26}
  .strip .num{font-size:13px;font-weight:700;color:var(--amber);text-align:center;cursor:grab}
  .strip .num .grip{display:block;font-size:11px;color:var(--muted-2);line-height:1;margin-bottom:1px}
  .strip .cs{font-size:13px;font-weight:700;letter-spacing:.04em}
  .strip .info{font-size:10px;color:var(--muted);margin-top:2px}
  .strip .gap{font-size:9px;margin-top:3px;color:var(--cyan);letter-spacing:.02em}
  .strip .gap.short{color:var(--red)}
  .strip .eta{text-align:right}
  .strip .eta .big{font-size:14px;font-weight:700}
  .strip .eta .dl{font-size:10px;margin-top:2px}
  .dl.zero{color:var(--green)} .dl.low{color:var(--amber)} .dl.high{color:var(--red)}
  .ph{font-size:8px;font-weight:700;letter-spacing:.08em;padding:1px 4px;border-radius:3px;vertical-align:1px;margin-right:2px}
  .ph.gnd{background:#2e2407;color:var(--amber);border:1px solid #5a4818}
  .strip.dragging{opacity:.4}
  .strip.dragover{box-shadow:inset 0 2px 0 0 var(--amber)}
  .strip.view-only .grip{opacity:.25;cursor:default}
  .strip-empty{padding:14px 10px;text-align:center;color:var(--muted-2);font-family:var(--mono);font-size:11px}

  .tablewrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); }
  .tablewrap.mini table { font-size: 15px; }
  .tablewrap.mini th, .tablewrap.mini td { padding: 7px 9px; }
  .tablewrap.mini th { font-size: 12px; letter-spacing: 0.08em; }
  .tablewrap.mini .cell-edct { font-size: 15px; }
  .tablewrap.mini .grip { font-size: 16px; }
  .tablewrap.mini .rdy-btn { font-size: 12px; padding: 5px 9px; }
  .tablewrap.combined { max-width: 420px; margin-top: 4px; }

  .section-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
    color: var(--muted); margin: 0 0 6px; text-transform: uppercase;
  }

  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--line); }
  th { font-size: 9px; letter-spacing: 0.1em; color: var(--muted); background: #0a0e14; position: sticky; top: 0; }
  tr:last-child td { border-bottom: none; }
  tr.metered:hover { background: #121820; }
  tr.metered { user-select: none; -webkit-user-select: none; }
  tr.metered td { cursor: grab; }
  tr.metered td:has(button) { cursor: default; }
  tr.dragging { opacity: 0.4; }
  tr.dragover td { box-shadow: inset 0 2px 0 0 var(--amber); }
  tr.view-only .grip { opacity: 0.25; cursor: default; }
  .grip { cursor: grab; color: var(--muted-2); font-size: 12px; user-select: none; }
  .cell-strong { font-weight: 700; color: var(--cyan); letter-spacing: 0.04em; }
  .cell-edct { font-weight: 700; font-size: 12px; }
  .cell-hold { color: var(--red); }
  .cell-ok { color: var(--green); }
  .cell-frozen { color: #56d364; font-weight: 700; }
  .rdy-btn { font: 700 9px/1 var(--mono, monospace); letter-spacing: .5px; cursor: pointer;
    padding: 3px 6px; border: 1px solid var(--muted-2); border-radius: 4px; background: transparent;
    color: var(--muted-2); }
  .rdy-btn:hover { color: var(--amber); border-color: var(--amber); }
  .rdy-btn.on { color: #56d364; border-color: #56d364; background: rgba(86,211,100,.08); }
  .rdy-btn.on:hover { color: var(--red); border-color: var(--red); }
  .cell-warn { color: var(--amber); }
  .fca-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; border: 1px solid; font-size: 9px; }
  .msg, .emptystate {
    font-family: var(--mono); font-size: 12px; color: var(--muted); line-height: 1.7;
    padding: 24px; text-align: center; border: 1px dashed var(--line-2); border-radius: 8px;
  }
  .emptystate h2 { margin: 0 0 8px; font-size: 13px; color: var(--text); letter-spacing: 0.1em; }
  .emptystate-actions { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
  .emptystate input { width: 100px; text-transform: uppercase; }

  #settingsBtn { font-size: 14px; line-height: 1; padding: 5px 9px; }
  #settingsBtn.on { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
  .settings-panel {
    display: none; padding: 12px 16px; border-bottom: 1px solid var(--line);
    background: #0a0e14; font-family: var(--mono); font-size: 11px;
  }
  .settings-panel.show { display: block; }
  .settings-panel .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .settings-panel label { color: var(--muted); letter-spacing: 0.08em; font-size: 10px; }
  .settings-panel input#cidInput {
    width: 120px; background: #0e1319; border: 1px solid var(--line-2); border-radius: 5px;
    color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 8px;
  }
  .settings-panel input#cidInput:focus { outline: none; border-color: var(--amber); }
  #atcStatus { font-size: 10px; color: var(--muted-2); margin-top: 8px; line-height: 1.5; }
  #atcStatus.ok { color: var(--green); }
  #atcStatus.err { color: var(--red); }
  .settings-hint { font-size: 9px; color: var(--muted-2); margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body class="tower-page">
<div id="vatflowAppNav"></div>

<header class="topbar">
  <div class="brand"><b>TOWER DEPARTURES</b><span class="tag">FCA METERING</span></div>
  <div class="field-row">
    <label for="fieldInput">FIELD</label>
    <input id="fieldInput" maxlength="4" placeholder="KATL" autocomplete="off">
    <button type="button" class="btn primary sm" id="loadBtn">Load</button>
  </div>
  <div class="spacer"></div>
  <button type="button" class="btn sm" id="settingsBtn" title="Controller settings">⚙</button>
  <div id="lockCtl">
    <button type="button" id="lockBtn" class="locked">View only</button>
    <input id="pwInput" type="password" placeholder="control password" autocomplete="off" class="hidden">
    <button type="button" id="pwGo" class="btn sm hidden">Go</button>
    <span id="lockMsg"></span>
  </div>
  <div class="stat"><span class="dot" id="feedDot"></span><span id="feedTxt">connecting…</span></div>
  <div class="stat"><span class="dot" id="syncDot"></span><span id="syncTxt">FCAs —</span></div>
  <div class="stat"><b id="zClock">----Z</b></div>
  <div class="stat">refresh <b id="refreshIn">--</b>s</div>
  <button type="button" class="btn sm" id="refreshBtn">↻</button>
</header>

<div class="settings-panel" id="settingsPanel">
  <div class="row">
    <label for="cidInput">VATSIM CID</label>
    <input id="cidInput" maxlength="9" inputmode="numeric" placeholder="1234567" autocomplete="off">
    <button type="button" class="btn primary sm" id="verifyCidBtn">Verify</button>
    <button type="button" class="btn sm" id="clearCidBtn">Clear</button>
  </div>
  <div id="atcStatus">Enter your CID while online on a _TWR or _GND position to unlock reorder.</div>
  <div class="settings-hint">Verified online on tower/ground — no password needed. Re-checked every feed refresh (~20s).</div>
</div>

<main id="main"></main>

<script src="shared/vatflow-control-store.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
"use strict";

import { mountVatflowNav } from "./shared/vatflow-nav.js";
import { mountHelp, TOWER_HELP } from "./shared/vatflow-help.js";
import {
  loadAirports, seedAirports, fmtZulu, fpFields, computeTowerDepartures, reorderFcaGlobalOrder,
  getAirport, parseAlt, markReady, clearReady, isReady, COMPLIANCE_EARLY_MS, COMPLIANCE_LATE_MS,
} from "./shared/fca-metering.js";
import { verifyTowerAtc } from "./shared/tower-atc-auth.js";
import { loadNavData } from "./shared/route-engine.js";
import { fetchWinds, bindWindAirportLookup } from "./shared/winds-aloft.js";

const SUPABASE_URL = "https://qoaipsfcidpymboojfwa.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6Pj7jeRN0AQBcjl44MoCNA_zjsvFs79";
const LS_FCAS = "fcaBuilder.fcas.v1";
const LS_FIELD = "towerDepIcao";
const LS_CID = "towerDep.cid.v1";
const LS_TOWER_UI = "towerDep.ui.v1";
const REFRESH_SEC = 20;

const CONTROL_PASSWORD_LOCAL = "";
let passwordUnlocked = VatflowControl.load();

function canControl() {
  return state.atcVerified || passwordUnlocked;
}

const state = {
  field: "",
  fcas: [],
  pilots: [],
  prefiles: [],
  controllers: [],
  feed: "init",
  countdown: REFRESH_SEC,
  cid: "",
  atcVerified: false,
  atcCallsign: null,
  atcFieldIcao: null,
  atcReason: null,
  fcaOrder: [],
  pinnedFcas: new Set(),
  hiddenFcas: new Set(),
};

let sb = null, liveTimer = null, countdownTimer = null, stripDragging = false;
let dragCs = null, dragFcaId = null, pendingRender = false;

const DEMO_AIRPORTS = {
  KATL: [33.64, -84.43], KJFK: [40.64, -73.78], KORD: [41.98, -87.90], KDFW: [32.90, -97.04],
  KDEN: [39.86, -104.67], KLAX: [33.94, -118.41], KMIA: [25.79, -80.29], KBOS: [42.36, -71.01],
};
seedAirports(DEMO_AIRPORTS);

function loadTowerUi() {
  try {
    const u = JSON.parse(localStorage.getItem(LS_TOWER_UI) || "{}");
    state.fcaOrder = Array.isArray(u.fcaOrder) ? u.fcaOrder : [];
    state.pinnedFcas = new Set(u.pinnedFcas || []);
    state.hiddenFcas = new Set(u.hiddenFcas || []);
  } catch (_) {
    state.fcaOrder = [];
    state.pinnedFcas = new Set();
    state.hiddenFcas = new Set();
  }
}

function saveTowerUi() {
  try {
    localStorage.setItem(LS_TOWER_UI, JSON.stringify({
      fcaOrder: state.fcaOrder,
      pinnedFcas: [...state.pinnedFcas],
      hiddenFcas: [...state.hiddenFcas],
    }));
  } catch (_) {}
}

function captureFcaDomOrder() {
  const grid = document.getElementById("fcaGrid");
  if (!grid) return;
  state.fcaOrder = [...grid.querySelectorAll(".fca-block:not(.hidden-block)")]
    .map(el => el.getAttribute("data-fca-id"))
    .filter(Boolean);
  saveTowerUi();
}

function orderedVisibleFcas(activeFcas) {
  const visible = activeFcas.filter(f => !state.hiddenFcas.has(f.id));
  const byId = new Map(visible.map(f => [f.id, f]));
  const out = [];
  for (const id of state.fcaOrder) {
    if (byId.has(id)) { out.push(byId.get(id)); byId.delete(id); }
  }
  for (const f of visible) {
    if (byId.has(f.id)) out.push(f);
  }
  return out;
}

function hiddenFcaList(activeFcas) {
  return activeFcas.filter(f => state.hiddenFcas.has(f.id));
}

function togglePinFca(fcaId) {
  captureFcaDomOrder();
  if (state.pinnedFcas.has(fcaId)) state.pinnedFcas.delete(fcaId);
  else state.pinnedFcas.add(fcaId);
  saveTowerUi();
  applyFcaBlockClasses();
}

function toggleHideFca(fcaId) {
  if (state.hiddenFcas.has(fcaId)) state.hiddenFcas.delete(fcaId);
  else {
    state.hiddenFcas.add(fcaId);
    state.pinnedFcas.delete(fcaId);
  }
  captureFcaDomOrder();
  state.fcaOrder = state.fcaOrder.filter(id => id !== fcaId || !state.hiddenFcas.has(id));
  saveTowerUi();
  render();
}

function showHiddenFca(fcaId) {
  state.hiddenFcas.delete(fcaId);
  if (!state.fcaOrder.includes(fcaId)) state.fcaOrder.push(fcaId);
  saveTowerUi();
  render();
}

function loadSavedCid() {
  try {
    const cid = localStorage.getItem(LS_CID);
    if (cid) state.cid = cid.replace(/\D/g, "");
  } catch (_) {}
}

function saveCid(cid) {
  state.cid = (cid || "").replace(/\D/g, "");
  try {
    if (state.cid) localStorage.setItem(LS_CID, state.cid);
    else localStorage.removeItem(LS_CID);
  } catch (_) {}
  const input = document.getElementById("cidInput");
  if (input) input.value = state.cid;
}

function updateAtcStatusUI() {
  const el = document.getElementById("atcStatus");
  if (!el) return;
  if (state.atcVerified && state.atcCallsign) {
    el.textContent = `Verified · ${state.atcCallsign}` + (state.atcFieldIcao ? ` · field ${state.atcFieldIcao}` : "");
    el.className = "ok";
  } else if (state.cid) {
    el.textContent = state.atcReason === "not_on_position"
      ? `CID ${state.cid} — not online on _TWR or _GND. Log on to your position and wait for the next refresh.`
      : `CID ${state.cid} — waiting for VATSIM feed…`;
    el.className = "err";
  } else {
    el.textContent = "Enter your CID while online on a _TWR or _GND position to unlock reorder.";
    el.className = "";
  }
}

function revalidateAtcAuth() {
  if (!state.cid) {
    state.atcVerified = false;
    state.atcCallsign = null;
    state.atcFieldIcao = null;
    state.atcReason = "no_cid";
    updateAtcStatusUI();
    updateLockUI();
    return;
  }
  const result = verifyTowerAtc(state.controllers, state.cid);
  state.atcVerified = result.verified;
  state.atcCallsign = result.callsign;
  state.atcFieldIcao = result.fieldIcao;
  state.atcReason = result.reason;
  updateAtcStatusUI();
  updateLockUI();
  if (result.verified && result.fieldIcao && !state.field) {
    activateField(result.fieldIcao);
  } else if (!stripDragging) {
    render();
  }
}

function verifyCidNow() {
  const input = document.getElementById("cidInput");
  const cid = (input ? input.value : state.cid).replace(/\D/g, "");
  if (!cid) {
    document.getElementById("atcStatus").textContent = "Enter a valid VATSIM CID.";
    document.getElementById("atcStatus").className = "err";
    return;
  }
  saveCid(cid);
  revalidateAtcAuth();
}

function clearCidAuth() {
  saveCid("");
  state.atcVerified = false;
  state.atcCallsign = null;
  state.atcFieldIcao = null;
  state.atcReason = "no_cid";
  updateAtcStatusUI();
  updateLockUI();
  render();
}

function normalizeFca(f) {
  if (!f) return null;
  if (!f.id) f.id = "fca_" + Date.now();
  if (!Array.isArray(f.points)) f.points = [];
  if (!Array.isArray(f.order)) f.order = [];
  if (!f.releases || typeof f.releases !== "object" || Array.isArray(f.releases)) f.releases = {};
  if (f.enabled == null) f.enabled = true;
  return f;
}

function persistLocalFcas() {
  try { localStorage.setItem(LS_FCAS, JSON.stringify(state.fcas)); } catch (_) {}
}

function cloudPush(fca) {
  persistLocalFcas();
  if (!canControl() || !sb) return;
  sb.from("fcas").upsert({ id: fca.id, data: fca, updated_at: new Date().toISOString() })
    .then(({ error }) => { if (error) console.warn("tower push:", error); });
}

function loadLocalFcas() {
  try {
    const arr = JSON.parse(localStorage.getItem(LS_FCAS) || "[]");
    if (Array.isArray(arr) && arr.length) state.fcas = arr.map(normalizeFca).filter(Boolean);
  } catch (_) {}
}

function setSyncStatus(kind, extra) {
  const dot = document.getElementById("syncDot"), txt = document.getElementById("syncTxt");
  if (!dot) return;
  const map = {
    local: ["", "FCAs · local cache"],
    connecting: ["demo", "FCAs · connecting…"],
    connected: ["live", "FCAs · live"],
    error: ["dead", "FCAs · sync error"],
    none: ["dead", "FCAs · none active"],
  };
  const m = map[kind] || map.local;
  dot.className = "dot" + (m[0] ? " " + m[0] : "");
  txt.textContent = extra || m[1];
}

function initSync() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) {
    setSyncStatus("local");
    return;
  }
  try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch (e) { console.warn(e); setSyncStatus("error"); return; }
  setSyncStatus("connecting");
  sb.from("fcas").select("*").then(({ data, error }) => {
    if (error) { console.warn(error); setSyncStatus("error"); return; }
    state.fcas = (data || []).map(r => normalizeFca(r.data || {}));
    persistLocalFcas();
    setSyncStatus("connected");
    render();
  });
  sb.channel("fcas-realtime")
    .on("postgres_changes", { event: "*", schema: "public", table: "fcas" }, () => {
      sb.from("fcas").select("*").then(({ data }) => {
        if (data) {
          state.fcas = data.map(r => normalizeFca(r.data || {}));
          persistLocalFcas();
          if (!stripDragging) render(); else pendingRender = true;
        }
      });
    })
    .subscribe(status => {
      if (status === "SUBSCRIBED") setSyncStatus("connected");
      else if (status === "CHANNEL_ERROR") setSyncStatus("error");
    });
}

function setFeed(s) {
  state.feed = s;
  const dot = document.getElementById("feedDot"), txt = document.getElementById("feedTxt");
  dot.className = "dot" + (s === "live" ? " live" : s === "dead" ? " dead" : "");
  txt.textContent = s === "live" ? "LIVE · VATSIM" : s === "dead" ? "no feed" : "connecting…";
}

function fetchLive() {
  fetch("https://data.vatsim.net/v3/vatsim-data.json", { cache: "no-store" })
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(d => {
      const pilots = (d.pilots || [])
        .filter(p => typeof p.latitude === "number" && typeof p.longitude === "number")
        .map(p => {
          const f = fpFields(p.flight_plan);
          const gs = p.groundspeed || 0;
          return { callsign: p.callsign, lat: p.latitude, lon: p.longitude, alt: p.altitude || 0,
            gs, hdg: p.heading || 0, phase: gs < 50 ? "gnd" : "air", ...f };
        });
      const connected = new Set(pilots.map(p => p.callsign));
      const prefiles = (d.prefiles || [])
        .filter(p => p.flight_plan && !connected.has(p.callsign))
        .map(p => {
          const f = fpFields(p.flight_plan);
          return { callsign: p.callsign, lat: null, lon: null, alt: 0, gs: 0, hdg: 0, phase: "gnd", prefile: true, ...f };
        });
      state.pilots = pilots;
      state.prefiles = prefiles;
      state.controllers = d.controllers || [];
      setFeed("live");
      revalidateAtcAuth();
      if (!stripDragging) render(); else pendingRender = true;
    })
    .catch(err => {
      console.warn(err);
      setFeed("dead");
    });
}

function startFeedLoop() {
  clearInterval(liveTimer);
  clearInterval(countdownTimer);
  state.countdown = REFRESH_SEC;
  const tick = () => { fetchLive(); state.countdown = REFRESH_SEC; };
  tick();
  liveTimer = setInterval(tick, REFRESH_SEC * 1000);
  countdownTimer = setInterval(() => {
    state.countdown = Math.max(0, state.countdown - 1);
    const el = document.getElementById("refreshIn");
    if (el) el.textContent = state.countdown;
  }, 1000);
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function gapLabel(gapMin, isLeader) {
  if (isLeader || gapMin == null) return "—";
  if (gapMin < 0.05) return "0";
  return gapMin.toFixed(1) + " min";
}

const EDCT_DELAY_MIN = 1;

function hasEdctDelay(delayMin) {
  return (delayMin || 0) > EDCT_DELAY_MIN;
}

/* Builder-style flight strip. CFR time is shown ONLY once issued via RDY —
   unissued strips show the expected hold, never a time or a green RELEASED,
   so tower controllers can't read an advisory number to a pilot by mistake. */
function renderDepStrip(d, i, canDrag) {
  const frozen = !!d.frozen;
  const fl = d.fpAlt ? Math.round(d.fpAlt / 100) : "—";
  const win = frozen ? ` · window ${fmtZulu(d.edctMs - COMPLIANCE_EARLY_MS)}–${fmtZulu(d.edctMs + COMPLIANCE_LATE_MS)}` : "";
  const big = frozen ? fmtZulu(d.edctMs) : "—";
  const holdMin = Math.round(d.delayMin || 0);
  const dlCls = frozen ? "zero" : holdMin > 5 ? "high" : holdMin > 1 ? "low" : "zero";
  const dlTxt = frozen ? "released" : holdMin > 1 ? `est hold +${holdMin}m` : "no delay expected";
  const gapLine = (i > 0 && isFinite(d.gapMin))
    ? `<div class="gap${d.gapMin < 0.5 ? " short" : ""}">↑ ${d.gapMin.toFixed(1)} min behind previous crosser</div>` : "";
  const btn = canControl()
    ? `<button type="button" class="rdy-btn${frozen ? " on" : ""}" data-rdy-cs="${escapeHtml(d.callsign)}" data-rdy-fca="${escapeHtml(d.fcaId)}" title="${frozen ? "Cancel this CFR release" : "Pilot called ready — issue CFR release"}">${frozen ? "RLSD ✕" : "RDY"}</button>`
    : (frozen ? `<span class="cell-frozen">RLSD</span>` : "");
  return `<div class="strip${canDrag ? "" : " view-only"}" data-cs="${escapeHtml(d.callsign)}"${canDrag ? ' draggable="true"' : ""}>` +
    `<div class="num" title="drag to reorder"><span class="grip">⣿</span>${i + 1}</div>` +
    `<div><div class="cs"><span class="ph gnd">${frozen ? "RLSD" : "CFR"}</span> ${escapeHtml(d.callsign)} <span style="color:var(--muted);font-weight:400">${escapeHtml(d.type || "")}</span></div>` +
    `<div class="info">${escapeHtml(d.dep || "????")} → ${escapeHtml(d.arr || "????")} · FL${fl} · ${Math.round(d.dist || 0)}nm to line · cross ${fmtZulu(d.ctaMs)}${win}</div>${gapLine}</div>` +
    `<div class="eta"><div class="big" style="color:${frozen ? "#56d364" : "var(--muted-2)"}">${big}</div>` +
    `<div class="dl ${dlCls}">${dlTxt}</div></div>` +
    `<div style="display:flex;flex-direction:column;align-items:center">${btn}</div></div>`;
}

function renderFcaMiniTable(fca, rows, canDrag) {
  const fcaStyle = fca.color
    ? `color:${fca.color};border-color:${fca.color}55;background:${fca.color}18`
    : "";
  const holding = rows.filter(d => hasEdctDelay(d.delayMin)).length;
  const pinned = state.pinnedFcas.has(fca.id);
  let html =
    `<div class="fca-block${pinned ? " pinned" : ""}${rows.length ? "" : " empty"}" data-fca-id="${escapeHtml(fca.id)}">` +
    `<div class="fca-block-head">` +
    `<span class="fca-tag fca-name" style="${fcaStyle}">${escapeHtml(fca.name || fca.id)}</span>` +
    `<span class="fca-meta fca-block-meta">${rows.length} dep${rows.length === 1 ? "" : "s"}` +
    (holding ? ` · ${holding} holding` : "") +
    `</span>` +
    `<div class="fca-actions">` +
    (fca.manualSeq
      ? `<button type="button" class="fca-btn auto-btn" data-fca-id="${escapeHtml(fca.id)}" title="Manual sequence active — click to return to automatic ETA-based sequencing">AUTO</button>`
      : "") +
    `<button type="button" class="fca-btn pin-btn${pinned ? " on" : ""}" data-fca-id="${escapeHtml(fca.id)}" title="Pin table position">PIN</button>` +
    `<button type="button" class="fca-btn hide-btn" data-fca-id="${escapeHtml(fca.id)}" title="Hide this FCA">HIDE</button>` +
    `</div></div>` +
    `<div class="stripList depBody" data-fca="${escapeHtml(fca.id)}">`;
  if (rows.length) {
    rows.forEach((d, i) => { html += renderDepStrip(d, i, canDrag); });
  } else {
    html += `<div class="strip-empty">No departures in this program</div>`;
  }
  html += `</div></div>`;
  return html;
}

function sortFcaRows(rows) {
  return rows.slice().sort((a, b) => (a.edctMs || 0) - (b.edctMs || 0));
}

function groupDeparturesByFca(departures) {
  const byFca = new Map();
  for (const d of departures) {
    if (!byFca.has(d.fcaId)) byFca.set(d.fcaId, []);
    byFca.get(d.fcaId).push(d);
  }
  for (const rows of byFca.values()) sortFcaRows(rows);
  return byFca;
}

function renderStripHtml(result) {
  const holding = result.departures.filter(d => hasEdctDelay(d.delayMin)).length;
  return `<div class="strip" id="depStrip">` +
    `<span class="field">${escapeHtml(state.field)} DEPARTURES</span>` +
    `<span class="stat">TOTAL <b>${result.total}</b></span>` +
    `<span class="stat stat-warn">METERED <b>${result.metered}</b></span>` +
    (holding ? `<span class="stat stat-alert">HOLDING <b>${holding}</b></span>` : "") +
    `</div>`;
}

function updateStrip(result) {
  const el = document.getElementById("depStrip");
  if (el) el.outerHTML = renderStripHtml(result);
}

function updateFcaBlock(fca, rows, canDrag) {
  const block = document.querySelector(`.fca-block[data-fca-id="${fca.id}"]`);
  if (!block) return false;
  const holding = rows.filter(d => hasEdctDelay(d.delayMin)).length;
  const meta = block.querySelector(".fca-block-meta");
  if (meta) {
    meta.textContent = `${rows.length} dep${rows.length === 1 ? "" : "s"}` +
      (holding ? ` · ${holding} holding` : "");
  }
  block.classList.toggle("empty", !rows.length);
  block.classList.toggle("pinned", state.pinnedFcas.has(fca.id));
  const pinBtn = block.querySelector(".pin-btn");
  if (pinBtn) pinBtn.classList.toggle("on", state.pinnedFcas.has(fca.id));
  const list = block.querySelector(".stripList.depBody");
  if (!list) return false;
  let html = "";
  if (rows.length) {
    rows.forEach((d, i) => { html += renderDepStrip(d, i, canDrag); });
  } else {
    html = `<div class="strip-empty">No departures in this program</div>`;
  }
  list.innerHTML = html;
  wireTableDrag(list, fca.id);
  return true;
}

function applyFcaBlockClasses() {
  document.querySelectorAll(".fca-block").forEach(block => {
    const id = block.getAttribute("data-fca-id");
    block.classList.toggle("pinned", state.pinnedFcas.has(id));

    if (pinBtn) pinBtn.classList.toggle("on", state.pinnedFcas.has(id));

}

function renderHiddenFcasBarHtml(activeFcas) {

}

function wireFcaBlockActions() {

  document.querySelectorAll(".auto-btn").forEach(btn => {

      if (!fca) return;
      fca.order = [];

function syncFcaGridDomOrder(ordered) {
  const grid = document.getElementById("fcaGrid");
  if (!grid) return;

  const blocks = [...grid.querySelectorAll(".fca-block")];
  const byId = new Map(blocks.map(b => [b.getAttribute("data-fca-id"), b]));
  const pinnedAt = new Map();
  blocks.forEach((b, i) => {
    const id = b.getAttribute("data-fca-id");
    if (state.pinnedFcas.has(id)) pinnedAt.set(id, i);
  });

  if (!pinnedAt.size) {
    for (const fca of ordered) {
      const b = byId.get(fca.id);
      if (b) grid.appendChild(b);
    }
    captureFcaDomOrder();
    return;
  }

  const targetUnpinned = ordered.filter(f => !state.pinnedFcas.has(f.id)).map(f => f.id);
  const slots = new Array(Math.max(blocks.length, ordered.length)).fill(null);
  for (const [id, idx] of pinnedAt) {
    if (byId.has(id) && idx < slots.length) slots[idx] = byId.get(id);
  }

  let ui = 0;
  for (let i = 0; i < slots.length; i++) {
    if (slots[i]) continue;
    while (ui < targetUnpinned.length && pinnedAt.has(targetUnpinned[ui])) ui++;
    if (ui >= targetUnpinned.length) break;
    const b = byId.get(targetUnpinned[ui++]);
    if (b) slots[i] = b;
  }

  for (const fca of ordered) {
    const b = byId.get(fca.id);
    if (b && !slots.includes(b)) slots.push(b);
  }

  for (const b of slots.filter(Boolean)) grid.appendChild(b);
}

function syncFcaGrid(activeFcas, byFca, dragOk) {
  const grid = document.getElementById("fcaGrid");
  if (!grid) return false;

  const ordered = orderedVisibleFcas(activeFcas);
  const orderedIds = new Set(ordered.map(f => f.id));

  [...grid.querySelectorAll(".fca-block")].forEach(block => {
    const id = block.getAttribute("data-fca-id");
    if (!orderedIds.has(id)) block.remove();
  });

  for (const fca of ordered) {
    const rows = byFca.get(fca.id) || [];
    let block = grid.querySelector(`.fca-block[data-fca-id="${fca.id}"]`);
    if (!block) {
      grid.insertAdjacentHTML("beforeend", renderFcaMiniTable(fca, rows, dragOk));
    } else {
      updateFcaBlock(fca, rows, dragOk);
    }
  }

  syncFcaGridDomOrder(ordered);
  wireFcaBlockActions();
  wireAllTableDrag();
  return true;
}

function seqHintHtml() {
  return canControl()
    ? (state.atcVerified
      ? "⠿ drag # to reorder within each FCA — PIN locks table position · verified via VATSIM position · syncs to FCA Builder"
      : "⠿ drag # to reorder within each FCA — PIN locks table position · syncs to FCA Builder global sequence")
    : "View only — enter your CID in Settings while on _TWR/_GND, or use the control password";
}

function canIncrementalRender() {
  return !!(state.field && document.getElementById("depStrip") && document.getElementById("fcaGrid"));
}

function renderFcaGridOnly() {
  const activeFcas = state.fcas.filter(f => f.enabled && f.points && f.points.length >= 2);
  if (!activeFcas.length || !canIncrementalRender()) { render(); return; }
  const result = computeTowerDepartures(state.field, state.fcas, state.pilots);
  const byFca = groupDeparturesByFca(result.departures);
  updateStrip(result);
  updateHiddenFcasBar(activeFcas);
  syncFcaGrid(activeFcas, byFca, canControl());
}

function refreshAfterReorder(fcaId) {
  const result = computeTowerDepartures(state.field, state.fcas, state.pilots, state.prefiles);
  const byFca = groupDeparturesByFca(result.departures);
  const fca = state.fcas.find(f => f.id === fcaId);
  if (!fca) { render(); return; }
  const rows = byFca.get(fcaId) || [];
  updateStrip(result);
  if (!updateFcaBlock(fca, rows, canControl())) render();
}

/* Drag reorder — rebuild-proof design.
   Listeners are DELEGATED on the tbody (which survives innerHTML rebuilds),
   the dragged callsign travels in module state AND the dataTransfer payload
   (so it survives even a full row rebuild mid-drag), and drops are accepted
   anywhere in the table with nearest-row resolution — no more dead zones on
   padding/borders. Feed/sync refreshes suppressed during a drag are flushed
   on dragend via pendingRender. */
function wireTableDrag(list, fcaId) {
  if (!canControl() || !list) return;
  list.querySelectorAll(".strip").forEach(el => el.setAttribute("draggable", "true"));
  if (list._dragWired) return;                       // delegated listeners persist on the container
  list._dragWired = true;

  const clearHl = () => list.querySelectorAll(".dragover, .dragging")
    .forEach(x => x.classList.remove("dragover", "dragging"));

  list.addEventListener("dragstart", e => {
    const el = e.target.closest && e.target.closest(".strip[data-cs]");
    if (!el) return;
    dragCs = el.getAttribute("data-cs");
    dragFcaId = fcaId;
    stripDragging = true;
    el.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", dragCs); } catch (_) {}
  });

  list.addEventListener("dragend", () => {
    clearHl();
    stripDragging = false;
    dragCs = null; dragFcaId = null;
    if (pendingRender) { pendingRender = false; render(); }
  });

  list.addEventListener("dragover", e => {
    e.preventDefault();                              // accept the drop anywhere in the list
    e.dataTransfer.dropEffect = "move";
    const el = e.target.closest && e.target.closest(".strip[data-cs]");
    list.querySelectorAll(".dragover").forEach(x => x.classList.remove("dragover"));
    if (el && el.getAttribute("data-cs") !== dragCs) el.classList.add("dragover");
  });

  list.addEventListener("drop", e => {
    e.preventDefault();
    const el = e.target.closest && e.target.closest(".strip[data-cs]");
    clearHl();
    let fromCs = dragCs;
    try { fromCs = e.dataTransfer.getData("text/plain") || dragCs; } catch (_) {}
    const toCs = el && el.getAttribute("data-cs");
    if (dragFcaId != null && dragFcaId !== fcaId) return;   // dropped on a different FCA's list
    if (!fromCs || !toCs || fromCs === toCs) return;
    moveTowerOrder(fcaId, fromCs, toCs);
  });
}

function wireAllTableDrag() {
  document.querySelectorAll(".stripList.depBody[data-fca]").forEach(list => {
    wireTableDrag(list, list.getAttribute("data-fca"));
  });
}

document.addEventListener("click", e => {
  const btn = e.target.closest(".rdy-btn");
  if (!btn) return;
  e.stopPropagation();
  if (!canControl()) return;
  const cs = btn.getAttribute("data-rdy-cs");
  const fca = state.fcas.find(f => f.id === btn.getAttribute("data-rdy-fca"));
  if (!cs || !fca) return;
  if (isReady(fca, cs)) {
    clearReady(fca, cs);
  } else {
    const rel = markReady(fca, cs, state.pilots, Date.now());
    if (!rel) return;
  }
  cloudPush(fca);
  render();
});

function moveTowerOrder(fcaId, fromCs, toCs) {
  if (!canControl() || fromCs === toCs) return;
  const fca = state.fcas.find(f => f.id === fcaId);
  if (!fca) return;
  fca.order = reorderFcaGlobalOrder(fca, state.pilots, [], fromCs, toCs);
  fca.manualSeq = true;
  cloudPush(fca);
  refreshAfterReorder(fcaId);
}

function render() {
  const main = document.getElementById("main");
  if (!state.field) {
    main.innerHTML =
      `<div class="emptystate"><h2>ENTER YOUR FIELD</h2>` +
      `<p>Type your tower airport ICAO (e.g. KATL) to see departures metered against active FCAs from FCA Builder.</p>` +
      `<div class="emptystate-actions">` +
      `<input id="splashField" maxlength="4" placeholder="KATL" class="field-row input">` +
      `<button type="button" class="btn primary" id="splashLoad">Load</button></div></div>`;
    const sf = document.getElementById("splashField");
    const sl = document.getElementById("splashLoad");
    if (sf && sl) {
      sf.addEventListener("input", () => { sf.value = sf.value.toUpperCase(); });
      sf.addEventListener("keydown", e => { if (e.key === "Enter") activateField(sf.value); });
      sl.addEventListener("click", () => activateField(sf.value));
    }
    return;
  }

  const activeFcas = state.fcas.filter(f => f.enabled && f.points && f.points.length >= 2);
  if (!activeFcas.length) {
    main.innerHTML = `<div class="msg">No active FCAs. Enable at least one FCA with a drawn line in FCA Builder.</div>`;
    setSyncStatus(state.fcas.length ? "none" : "local");
    return;
  }

  const result = computeTowerDepartures(state.field, state.fcas, state.pilots);
  const meteredSet = new Set(result.departures.map(d => d.callsign));
  const unmetered = [];
  const seen = new Set();
  for (const p of state.pilots) {
    if ((p.dep || "").toUpperCase() !== state.field) continue;
    if ((p.gs || 0) > 60 && (p.alt || 0) > 300) continue;
    if (seen.has(p.callsign)) continue;
    seen.add(p.callsign);
    if (!meteredSet.has(p.callsign)) unmetered.push(p);
  }

  if (!result.total) {
    main.innerHTML = renderStripHtml(result) +
      `<div class="msg">No undeparted traffic filed out of ${escapeHtml(state.field)} right now.</div>`;
    return;
  }

  const byFca = groupDeparturesByFca(result.departures);
  const dragOk = canControl();
  const orderedFcas = orderedVisibleFcas(activeFcas);

  if (canIncrementalRender()) {
    updateStrip(result);
    let hint = document.querySelector(".seqhint");
    if (hint) hint.textContent = seqHintHtml();
    updateHiddenFcasBar(activeFcas);
    syncFcaGrid(activeFcas, byFca, dragOk);
    syncUnmeteredSection(unmetered);
    return;
  }

  let html = renderStripHtml(result);
  html += `<div class="seqhint">${seqHintHtml()}</div>`;
  html += renderHiddenFcasBarHtml(activeFcas);
  if (orderedFcas.length) {
    html += `<div class="fca-grid" id="fcaGrid">`;
    for (const fca of orderedFcas) {
      html += renderFcaMiniTable(fca, byFca.get(fca.id) || [], dragOk);
    }
    html += `</div>`;
  }
  html += renderUnmeteredHtml(unmetered);
  main.innerHTML = html;
  captureFcaDomOrder();
  wireHiddenFcaBar();
  wireFcaBlockActions();
  wireAllTableDrag();
}

function activateField(icao) {
  icao = (icao || "").trim().toUpperCase();
  if (!icao) return;
  state.field = icao;
  try { localStorage.setItem(LS_FIELD, icao); } catch (_) {}
  document.getElementById("fieldInput").value = icao;
  render();
}

function updateLockUI() {
  const btn = document.getElementById("lockBtn");
  if (state.atcVerified && state.atcCallsign) {
    btn.textContent = `Controller · ${state.atcCallsign}`;
    btn.className = "unlocked";
  } else if (passwordUnlocked) {
    btn.textContent = "Controller";
    btn.className = "unlocked";
  } else {
    btn.textContent = "View only";
    btn.className = "locked";
  }
  pwInput.classList.add("hidden");
  pwGo.classList.add("hidden");
}

function setPasswordControl(on) {
  passwordUnlocked = on;
  VatflowControl.save(on);
  updateLockUI();
  render();
}

/* boot */
mountVatflowNav(document.getElementById("vatflowAppNav"), "tower");
mountHelp(document.getElementById("lockCtl"), TOWER_HELP);

const lockBtn = document.getElementById("lockBtn");
const pwInput = document.getElementById("pwInput");
const pwGo = document.getElementById("pwGo");
const lockMsg = document.getElementById("lockMsg");

function showPwEntry() {
  pwInput.classList.remove("hidden");
  pwGo.classList.remove("hidden");
  pwInput.value = "";
  lockMsg.textContent = "";
  pwInput.focus();
}

function attemptUnlock(pw) {
  if (VatflowControl.checkPassword(pw, CONTROL_PASSWORD_LOCAL)) {
    lockMsg.textContent = "";
    setPasswordControl(true);
  } else {
    lockMsg.textContent = "wrong password";
    lockMsg.className = "lockerr";
  }
}

lockBtn.addEventListener("click", () => {
  if (canControl()) {
    if (passwordUnlocked) {
      setPasswordControl(false);
      lockMsg.textContent = "";
      return;
    }
    if (state.atcVerified) {
      lockMsg.textContent = "Verified via VATSIM position — use Settings › Clear to disconnect";
      lockMsg.className = "";
      return;
    }
    return;
  }
  if (pwInput.classList.contains("hidden")) showPwEntry();
  else attemptUnlock(pwInput.value);
});
pwGo.addEventListener("click", () => attemptUnlock(pwInput.value));
pwInput.addEventListener("keydown", e => { if (e.key === "Enter") attemptUnlock(pwInput.value); });

const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const cidInput = document.getElementById("cidInput");
settingsBtn.addEventListener("click", () => {
  const open = settingsPanel.classList.toggle("show");
  settingsBtn.classList.toggle("on", open);
});
document.getElementById("verifyCidBtn").addEventListener("click", verifyCidNow);
document.getElementById("clearCidBtn").addEventListener("click", clearCidAuth);
cidInput.addEventListener("input", () => { cidInput.value = cidInput.value.replace(/\D/g, ""); });
cidInput.addEventListener("keydown", e => { if (e.key === "Enter") verifyCidNow(); });

document.getElementById("fieldInput").addEventListener("input", e => { e.target.value = e.target.value.toUpperCase(); });
document.getElementById("loadBtn").addEventListener("click", () => activateField(document.getElementById("fieldInput").value));
document.getElementById("fieldInput").addEventListener("keydown", e => { if (e.key === "Enter") activateField(e.target.value); });
document.getElementById("refreshBtn").addEventListener("click", () => { fetchLive(); state.countdown = REFRESH_SEC; });

updateLockUI();
loadTowerUi();
loadSavedCid();
if (state.cid) cidInput.value = state.cid;
updateAtcStatusUI();
loadLocalFcas();
initSync();
loadAirports(() => {
  bindWindAirportLookup(icao => getAirport(icao));
  loadNavData().catch(() => {}).finally(() => render());
  fetchWinds().catch(() => {});
}).catch(() => render());

try {
  const saved = localStorage.getItem(LS_FIELD);
  if (saved) {
    document.getElementById("fieldInput").value = saved;
    activateField(saved);
  }
} catch (_) {}

startFeedLoop();

(function tickClock() {
  const el = document.getElementById("zClock");
  if (el) el.textContent = fmtZulu(Date.now());
  setTimeout(tickClock, 1000 - (Date.now() % 1000));
})();
</script>
<script type="module" src="shared/taxi-monitor-bg.js"></script>
</body>
