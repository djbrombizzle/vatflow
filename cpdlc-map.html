<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPDLC Map — VATFLOW</title>
<link rel="stylesheet" href="shared/vatflow-nav.css">
<style>
  :root {
    --bg: #050505;
    --fg: #cfcfcf;
    --fg-dim: #6b6b6b;
    --cyan: #3fb7b0;
    --green: #79d27a;
    --line: #333;
    --vatflow-nav-h: 28px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: "Cascadia Mono", "Cascadia Code", Consolas, "SF Mono", Menlo, monospace;
  }
  #vatflowAppNav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; }

  #mapPage {
    position: fixed;
    top: var(--vatflow-nav-h);
    left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    background: #0b0b0b;
  }
  .map-hdr {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: #161616; border-bottom: 1px solid #444;
    flex-shrink: 0;
  }
  .map-hdr .title { color: #fff; letter-spacing: 0.4px; font-size: 14px; }
  .map-hdr .sub { color: var(--fg-dim); font-size: 11px; }
  .map-hdr .stats { margin-left: auto; color: var(--fg-dim); font-size: 12px; white-space: nowrap; }

  #mapLegend {
    display: flex; gap: 18px; padding: 6px 14px; font-size: 11px;
    color: var(--fg-dim); border-bottom: 1px solid #222; flex-wrap: wrap; flex-shrink: 0;
  }
  .map-leg { display: flex; align-items: center; gap: 6px; }
  .map-leg .swatch { width: 14px; height: 10px; border: 1px solid #555; display: inline-block; }
  .map-leg .swatch.staffed { background: rgba(121, 210, 122, 0.35); border-color: var(--green); }
  .map-leg .dot-swatch { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .map-leg .dot-swatch.on { background: #9ef09f; }
  .map-leg .dot-swatch.off { background: #666; opacity: 0.5; }

  #mapWrap { flex: 1; min-height: 0; background: #050505; padding: 6px; }
  #mapSvg { width: 100%; height: 100%; display: block; }

  .map-artcc { fill: #0d0d0d; stroke: #333; stroke-width: 0.9; vector-effect: non-scaling-stroke; }
  .map-artcc-staffed { fill: rgba(121, 210, 122, 0.2); stroke: var(--green); stroke-width: 1.5; }
  .map-artcc-mine { stroke: var(--cyan); stroke-width: 1.6; }
  .map-ac { fill: #777; stroke: #999; stroke-width: 0.5; opacity: 0.5; }
  .map-ac-conn { fill: #9ef09f; stroke: #d4ffd5; stroke-width: 0.7; }
</style>
</head>
<body>
<div id="vatflowAppNav"></div>

<div id="mapPage">
  <div class="map-hdr">
    <span class="title">LIVE MAP</span>
    <span class="sub">vUSAlink CPDLC · view only · no login required</span>
    <span class="stats" id="mapStats">loading&hellip;</span>
  </div>
  <div id="mapLegend">
    <span class="map-leg"><span class="swatch staffed"></span> center using vUSAlink CPDLC</span>
    <span class="map-leg"><span class="dot-swatch on"></span> aircraft on KUSA</span>
    <span class="map-leg"><span class="dot-swatch off"></span> other VATSIM traffic</span>
    <span class="map-leg">ARTCC boundaries from VAT-Spy</span>
  </div>
  <div id="mapWrap">
    <svg id="mapSvg" viewBox="0 0 960 600" preserveAspectRatio="xMidYMid meet" aria-label="USA ARTCC map"></svg>
  </div>
</div>

<script type="module">
import { mountVatflowNav } from "./shared/vatflow-nav.js";
mountVatflowNav(document.getElementById("vatflowAppNav"), "cpdlc-map");
</script>
<script>
// Copied from vusalink LIVE MAP — same projection, hub payload, and styling.
const DEFAULT_HUB_URL = "https://web-production-3d9fe.up.railway.app";
function hubBase() { return DEFAULT_HUB_URL; }
function esc(s) {
  return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}

const MAP_BND_URL = "https://raw.githubusercontent.com/vatsimnetwork/vatspy-data-project/master/Boundaries.geojson";
const US_ARTCC_EXTRA = new Set(["PAZA", "PHZH", "KZAK", "KZWY", "TJZS"]);
const MAP_VIEW = { minLon: -130, maxLon: -63, minLat: 22, maxLat: 52, w: 960, h: 600, m: 12 };
function isUsArtcc(id) { return /^KZ[A-Z]{2}$/.test(id) || US_ARTCC_EXTRA.has(id); }
let mapBoundaryGeoms = null, mapTimer = null, mapLoading = false;

function mapProj(lon, lat) {
  const bw = MAP_VIEW.w - 2 * MAP_VIEW.m, bh = MAP_VIEW.h - 2 * MAP_VIEW.m;
  const x = MAP_VIEW.m + (lon - MAP_VIEW.minLon) / (MAP_VIEW.maxLon - MAP_VIEW.minLon) * bw;
  const y = MAP_VIEW.m + (MAP_VIEW.maxLat - lat) / (MAP_VIEW.maxLat - MAP_VIEW.minLat) * bh;
  return [x, y];
}
function mapRingPath(ring) {
  if (!ring || !ring.length) return "";
  return ring.map((pt, i) => {
    const xy = mapProj(pt[0], pt[1]);
    return (i ? "L" : "M") + xy[0].toFixed(1) + "," + xy[1].toFixed(1);
  }).join(" ") + " Z";
}
function mapGeomPaths(geom) {
  const out = [];
  const polys = geom.type === "Polygon" ? [geom.coordinates] :
    geom.type === "MultiPolygon" ? geom.coordinates : [];
  for (const poly of polys) for (const ring of poly) out.push(mapRingPath(ring));
  return out;
}
async function loadMapBoundaries() {
  if (mapBoundaryGeoms) return mapBoundaryGeoms;
  const r = await fetch(MAP_BND_URL);
  const gj = await r.json();
  mapBoundaryGeoms = {};
  for (const f of gj.features || []) {
    const id = (f.properties && f.properties.id || "").toUpperCase();
    if (!isUsArtcc(id) || !f.geometry) continue;
    mapBoundaryGeoms[id] = f.geometry;
  }
  return mapBoundaryGeoms;
}
async function fetchMapData() {
  const res = await fetch(hubBase() + "/hub/map", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: "{}",
  });
  let data;
  try { data = await res.json(); } catch (e) { throw new Error("hub map response invalid"); }
  if (!res.ok) throw new Error((data && data.error) || ("hub map HTTP " + res.status));
  return data;
}
function renderMapSvg(bnd, data, statsEl) {
  const svg = document.getElementById("mapSvg");
  if (!svg) return;
  const staffed = new Set((data && data.staffed) || []);
  const flights = (data && data.flights) || [];
  const onKusa = flights.filter(f => f.connected).length;
  const myArtcc = ""; // view-only page — no controller highlight
  const ctrlByArtcc = {};
  ((data && data.controllers) || []).forEach(c => {
    if (c.artcc && c.callsign) ctrlByArtcc[c.artcc] = c.callsign;
  });
  if (statsEl) {
    const hubNote = data ? "" : " · traffic unavailable";
    statsEl.textContent =
      `${flights.length} a/c · ${onKusa} on KUSA · ${staffed.size} CPDLC center${staffed.size === 1 ? "" : "s"}${hubNote}`;
  }
  let html = "";
  Object.keys(bnd).sort().forEach(id => {
    let cls = "map-artcc";
    if (staffed.has(id)) cls += " map-artcc-staffed";
    if (myArtcc && id === myArtcc) cls += " map-artcc-mine";
    const tip = id + (staffed.has(id) ? (" · CPDLC: " + (ctrlByArtcc[id] || "active")) : "");
    mapGeomPaths(bnd[id]).forEach(d => {
      if (d) html += `<path class="${cls}" data-artcc="${id}" d="${d}"><title>${esc(tip)}</title></path>`;
    });
  });
  flights.forEach(f => {
    if (f.lat == null || f.lon == null) return;
    const xy = mapProj(f.lon, f.lat);
    const cls = f.connected ? "map-ac-conn" : "map-ac";
    const tip = `${f.callsign} FL${f.fl || "?"}${f.connected ? " · KUSA" : ""}${f.artcc ? " · " + f.artcc : ""}`;
    html += `<circle class="${cls}" cx="${xy[0].toFixed(1)}" cy="${xy[1].toFixed(1)}" r="2.5"><title>${esc(tip)}</title></circle>`;
  });
  svg.innerHTML = html;
}
async function renderLiveMap() {
  const statsEl = document.getElementById("mapStats");
  const svg = document.getElementById("mapSvg");
  if (!svg || mapLoading) return;
  mapLoading = true;
  if (statsEl) statsEl.textContent = "loading…";
  try {
    let bnd, data, hubErr = "";
    try { bnd = await loadMapBoundaries(); }
    catch (e) { if (statsEl) statsEl.textContent = "boundaries load failed"; return; }
    try { data = await fetchMapData(); }
    catch (e) { hubErr = e.message || "hub map unavailable"; }
    if (!data || !data.ok) {
      hubErr = (data && data.error) || hubErr || "hub map unavailable";
      renderMapSvg(bnd, null, statsEl);
      if (statsEl) statsEl.textContent = hubErr + " · boundaries only";
      return;
    }
    renderMapSvg(bnd, data, statsEl);
  } catch (e) {
    if (statsEl) statsEl.textContent = (e && e.message) || "map load failed";
  } finally {
    mapLoading = false;
  }
}

renderLiveMap();
mapTimer = setInterval(() => renderLiveMap(), 30000);
</script>
</body>
</html>
